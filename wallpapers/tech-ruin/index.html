<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080b04; }
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('tech_ruin.png') center / cover no-repeat;
    }
    #night-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: #000; opacity: 0; pointer-events: none;
    }
    #effects, #dbg-canvas {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
    }
    #dbg-canvas { z-index: 3; }
    #dbg-overlay {
      position: fixed; inset: 0; cursor: crosshair; z-index: 9000; display: none;
    }
    #dbg-panel {
      position: fixed; top: 8px; left: 8px; z-index: 9999; display: none;
      background: rgba(0,0,0,0.72); color: #0f0; font: 12px/1.6 monospace;
      padding: 8px 10px; border-radius: 4px; pointer-events: none;
      max-width: 420px; white-space: pre;
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="night-overlay"></div>
  <canvas id="effects"></canvas>
  <canvas id="dbg-canvas"></canvas>
  <div id="dbg-overlay"></div>
  <div id="dbg-panel"></div>

  <script>
    // ══════════════════════════════════════════════════════════════════════════
    //  Image-anchor system
    // ══════════════════════════════════════════════════════════════════════════
    let imgNaturalW = 0, imgNaturalH = 0;
    const _probe = new Image();
    _probe.onload = () => {
      imgNaturalW = _probe.naturalWidth;
      imgNaturalH = _probe.naturalHeight;
      if (debugMode) updateDebugPanel(`Image: ${imgNaturalW}×${imgNaturalH}\nClick to capture paint coords.`);
    };
    _probe.src = 'tech_ruin.png';

    function coverScale() {
      const W = window.innerWidth, H = window.innerHeight;
      const s = Math.max(W / imgNaturalW, H / imgNaturalH);
      return { s, ox: (W - imgNaturalW * s) / 2, oy: (H - imgNaturalH * s) / 2 };
    }
    function paintToCanvas(px, py) {
      if (!imgNaturalW) return { x: px, y: py };
      const { s, ox, oy } = coverScale();
      return { x: px * s + ox, y: py * s + oy };
    }
    function canvasToPaint(sx, sy) {
      if (!imgNaturalW) return { px: 0, py: 0 };
      const { s, ox, oy } = coverScale();
      return { px: Math.round((sx - ox) / s), py: Math.round((sy - oy) / s) };
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  ANCHORS — measure with ?debug, fill in exact values.
    // ══════════════════════════════════════════════════════════════════════════
    const ANCHORS = {
      serverCenter:  [545, 460],   // center of server rack cluster — refine with ?debug
      serverRight:   [956, 445],   // right server module — pin 10
      monitorScreen: [910, 524],   // cracked monitor center — pins 1-4 avg; 39×30 paint-px
      mushroomClump: [1109, 711],  // foreground mushroom cluster — pin 5
      darkCavity:    [779, 619],   // dark hole in server rack — pins 6-9 avg
      waterfallTL:   [266, 187],   // pin 17 — top-left corner of waterfall
      waterfallTR:   [313, 199],   // pin 18 — top-right corner
      waterfallBL:   [280, 388],   // pin 19 — bottom-left corner
      waterfallBR:   [341, 391],   // pin 20 — bottom-right corner (original, kept for reference)
      waterfallBotL:   [296, 404], // pin 1 — actual bottom left of bush
      waterfallBotL2:  [310, 406], // pin 2 — bottom near bush left base
      waterfallBushTL: [309, 390], // pin 3 — bush left shoulder
      waterfallBushTR: [325, 391], // pin 4 — bush right shoulder
      waterfallBotR:   [331, 409], // pin 5 — actual bottom right of bush
      waterfallBR2:    [349, 414], // pin 6 — far right extended bottom
    };

    // ══════════════════════════════════════════════════════════════════════════
    //  Canvas setup
    // ══════════════════════════════════════════════════════════════════════════
    const fxCanvas  = document.getElementById('effects');
    const dbgCanvas = document.getElementById('dbg-canvas');
    const fxCtx     = fxCanvas.getContext('2d');
    const dbgCtx    = dbgCanvas.getContext('2d');

    function resize() {
      const W = window.innerWidth, H = window.innerHeight;
      fxCanvas.width = dbgCanvas.width   = W;
      fxCanvas.height = dbgCanvas.height = H;
    }
    resize();
    window.addEventListener('resize', () => { resize(); spores.init(); fireflies.init(); rainDrips.initAmb(); redrawDebugPins(); });

    function rnd(a, b)        { return a + Math.random() * (b - a); }
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
    const TAU = Math.PI * 2;

    // ══════════════════════════════════════════════════════════════════════════
    //  Event state
    // ══════════════════════════════════════════════════════════════════════════
    let glitchTimer = 0;
    let glitchMul   = 1;

    function triggerServerGlitch() { glitchTimer = 3200; }

    function handleSceneEvent(name) {
      switch (name) {
        case 'server_glitch':   triggerServerGlitch();           break;
        case 'firefly_surge':   fireflies.triggerSurge();        break;
        case 'bird_fly':        bird.trigger();                  break;
        case 'glow_surge':      glowSurge.trigger();             break;
        case 'cable_spark':     cableSpark.trigger();            break;
        case 'data_drift':      dataDrift.trigger();             break;
        case 'leaf_gust':       leafGust.trigger();              break;
        case 'rain_drips':      rainDrips.trigger();             break;
        case 'monitor_static':  monitorEvents.triggerStatic();   break;
        case 'screen_message':  monitorEvents.triggerMessage();  break;
        case 'scanner_sweep':   monitorEvents.triggerScanner();  break;
        case 'spore_cloud':     sporeCloud.trigger();            break;
        case 'eyes_appear':     eyesAppear.trigger();            break;
        case 'creature_scurry': creatureScurry.trigger();        break;
        case 'falling_leaf':    fallingLeaf.trigger();           break;
        case 'sunbeam_shift':   sunbeamShift.trigger();          break;
        case 'night_shift':     nightShift.trigger();            break;
        case 'power_arc':       powerArc.trigger();              break;
      }
    }

    window.chrome?.webview?.addEventListener('message', e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'event') handleSceneEvent(msg.name, msg.data);
      } catch {}
    });

    // ══════════════════════════════════════════════════════════════════════════
    //  God rays
    // ══════════════════════════════════════════════════════════════════════════
    const godRays = (() => {
      const shafts = [
        { nx: 0.36, angle:  0.12, phase: 0.00 },
        { nx: 0.48, angle:  0.02, phase: 1.40 },
        { nx: 0.56, angle: -0.06, phase: 2.70 },
        { nx: 0.42, angle:  0.20, phase: 0.75 },
        { nx: 0.53, angle: -0.15, phase: 4.10 },
      ];

      function draw(ctx, t) {
        const W = window.innerWidth, H = window.innerHeight;
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (const sh of shafts) {
          const ox  = sh.nx * W, oy = H * 0.01;
          const len = H * 1.28;
          const rw  = W * (0.055 + 0.025 * Math.sin(t * 0.00038 + sh.phase));
          const pulse = 0.56 + 0.26 * Math.sin(t * 0.00026 + sh.phase)
                             + 0.12 * Math.sin(t * 0.00088 + sh.phase * 1.6)
                             + 0.06 * Math.sin(t * 0.00210 + sh.phase * 2.4);
          const ex = ox + Math.sin(sh.angle) * len, ey = oy + Math.cos(sh.angle) * len;
          const perp = sh.angle + Math.PI / 2;
          const phx = Math.cos(perp) * rw * 0.5, phy = Math.sin(perp) * rw * 0.5;
          const grad = ctx.createLinearGradient(ox, oy, ex, ey);
          const a0 = 0.050 * pulse, a1 = 0.017 * pulse;
          grad.addColorStop(0,    `rgba(255,238,165,${a0.toFixed(3)})`);
          grad.addColorStop(0.38, `rgba(255,222,125,${a1.toFixed(3)})`);
          grad.addColorStop(1,    'rgba(230,200, 85,0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(ox - phx * 0.12, oy - phy * 0.12);
          ctx.lineTo(ox + phx * 0.12, oy + phy * 0.12);
          ctx.lineTo(ex + phx, ey + phy);
          ctx.lineTo(ex - phx, ey - phy);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }
      return { draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Server glow
    // ══════════════════════════════════════════════════════════════════════════
    const serverGlow = (() => {
      function draw(ctx, t, mul) {
        if (!ANCHORS.serverCenter || !imgNaturalW) return;
        const C = paintToCanvas(...ANCHORS.serverCenter);
        const { s } = coverScale();
        const R = 160 * s;
        const pulse = (0.52
          + 0.22 * Math.sin(t * 0.00084)
          + 0.15 * Math.sin(t * 0.00213)
          + 0.09 * Math.sin(t * 0.00641)
          + 0.02 * Math.sin(t * 0.01480)
        ) * mul;

        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        const ga  = 0.090 * pulse;
        const amb = ctx.createRadialGradient(C.x, C.y, 0, C.x, C.y, R * 2.5);
        amb.addColorStop(0,    `rgba(255,165, 50,${Math.min(0.999, ga * 2.3).toFixed(3)})`);
        amb.addColorStop(0.22, `rgba(238,135, 38,${(ga * 1.5).toFixed(3)})`);
        amb.addColorStop(0.50, `rgba(180, 85, 18,${ga.toFixed(3)})`);
        amb.addColorStop(0.80, `rgba(105, 48,  8,${(ga * 0.22).toFixed(3)})`);
        amb.addColorStop(1,    'rgba( 65, 22,  2,0)');
        ctx.fillStyle = amb;
        ctx.beginPath();
        ctx.arc(C.x, C.y, R * 2.5, 0, TAU);
        ctx.fill();

        const gp  = Math.max(0, 0.38 + 0.32 * Math.sin(t * 0.00342 + 1.18)) * mul;
        const ga2 = 0.040 * gp;
        const gcx = C.x - R * 0.30;
        const grn = ctx.createRadialGradient(gcx, C.y, 0, gcx, C.y, R * 0.92);
        grn.addColorStop(0,    `rgba( 80,255,118,${(ga2 * 2.2).toFixed(3)})`);
        grn.addColorStop(0.42, `rgba( 45,195, 72,${ga2.toFixed(3)})`);
        grn.addColorStop(1,    'rgba(  0, 88, 25,0)');
        ctx.fillStyle = grn;
        ctx.beginPath();
        ctx.arc(gcx, C.y, R * 0.92, 0, TAU);
        ctx.fill();

        ctx.restore();
      }
      return { draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Waterfall — permanent ambient shimmer on the cascade (always on).
    //  Clip polygon traces around the bush at the base.
    // ══════════════════════════════════════════════════════════════════════════
    const waterfall = (() => {
      const THREADS = 14;
      const threads = Array.from({ length: THREADS }, (_, i) => ({
        t:     (i + 0.5) / THREADS,
        phase: rnd(0, TAU),
        speed: rnd(0.00022, 0.00046),
        alpha: rnd(0.08, 0.20),
        wFreq: rnd(0.00014, 0.00030),
        wAmp:  rnd(0.4, 1.0),
      }));
      // Mist split into left-of-bush and right-of-bush pools
      const mistL = Array.from({ length: 4 }, () => ({
        t: rnd(0, 1), phase: rnd(0, TAU), r: rnd(5, 13), alpha: rnd(0.05, 0.12),
      }));
      const mistR = Array.from({ length: 6 }, () => ({
        t: rnd(0, 1), phase: rnd(0, TAU), r: rnd(5, 15), alpha: rnd(0.05, 0.13),
      }));

      function lerp(a, b, f) { return a + (b - a) * f; }

      function drawMist(ctx, t, bx, by, m, freqA, freqB) {
        const pulse = 0.5 + 0.38 * Math.sin(t * freqA + m.phase)
                          + 0.12 * Math.sin(t * freqB + m.phase * 1.8);
        const a = m.alpha * pulse;
        if (a < 0.006) return;
        const sc = coverScale().s;
        const r  = m.r * sc;
        const grd = ctx.createRadialGradient(bx, by, 0, bx, by, r * 2.0);
        grd.addColorStop(0,    `rgba(205,240,255,${Math.min(0.99, a * 1.5).toFixed(3)})`);
        grd.addColorStop(0.45, `rgba(188,228,255,${a.toFixed(3)})`);
        grd.addColorStop(1,    'rgba(165,215,255,0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(bx, by, r * 2.0, 0, TAU); ctx.fill();
      }

      function draw(ctx, t) {
        if (!ANCHORS.waterfallTL || !ANCHORS.waterfallBR2 || !imgNaturalW) return;
        const tl    = paintToCanvas(...ANCHORS.waterfallTL);
        const tr    = paintToCanvas(...ANCHORS.waterfallTR);
        const bl    = paintToCanvas(...ANCHORS.waterfallBL);
        const br2   = paintToCanvas(...ANCHORS.waterfallBR2);
        const botL  = paintToCanvas(...ANCHORS.waterfallBotL);
        const botL2 = paintToCanvas(...ANCHORS.waterfallBotL2);
        const bshTL = paintToCanvas(...ANCHORS.waterfallBushTL);
        const bshTR = paintToCanvas(...ANCHORS.waterfallBushTR);
        const botR  = paintToCanvas(...ANCHORS.waterfallBotR);
        const sc = coverScale().s;

        ctx.save();

        // Clip: TL → TR → far-right bottom → around bush notch → BL
        ctx.beginPath();
        ctx.moveTo(tl.x,    tl.y);
        ctx.lineTo(tr.x,    tr.y);
        ctx.lineTo(br2.x,   br2.y);
        ctx.lineTo(botR.x,  botR.y);
        ctx.lineTo(bshTR.x, bshTR.y);
        ctx.lineTo(bshTL.x, bshTL.y);
        ctx.lineTo(botL2.x, botL2.y);
        ctx.lineTo(botL.x,  botL.y);
        ctx.lineTo(bl.x,    bl.y);
        ctx.closePath();
        ctx.clip();

        ctx.globalCompositeOperation = 'screen';

        // Base cool shimmer filling the shape
        const mTx = lerp(tl.x, tr.x, 0.5), mTy = lerp(tl.y, tr.y, 0.5);
        const mBx = lerp(bl.x, br2.x, 0.5), mBy = lerp(bl.y, br2.y, 0.5);
        const bA  = 0.026 + 0.012 * Math.sin(t * 0.00034 + 1.1);
        const bGr = ctx.createLinearGradient(mTx, mTy, mBx, mBy);
        bGr.addColorStop(0,    `rgba(185,228,255,${(bA * 0.5).toFixed(3)})`);
        bGr.addColorStop(0.3,  `rgba(205,238,255,${bA.toFixed(3)})`);
        bGr.addColorStop(0.65, `rgba(192,230,255,${(bA * 0.8).toFixed(3)})`);
        bGr.addColorStop(1,    `rgba(175,218,255,${(bA * 0.28).toFixed(3)})`);
        ctx.fillStyle = bGr;
        ctx.fillRect(
          Math.min(tl.x, bl.x) - 2, Math.min(tl.y, tr.y) - 2,
          Math.max(tr.x, br2.x) - Math.min(tl.x, bl.x) + 4,
          Math.max(bl.y, br2.y) - Math.min(tl.y, tr.y) + 4
        );

        // Flowing highlights — travel downward; clip handles the bush boundary
        for (const th of threads) {
          const topX = lerp(tl.x, tr.x, th.t), topY = lerp(tl.y, tr.y, th.t);
          const botX = lerp(bl.x, br2.x, th.t), botY = lerp(bl.y, br2.y, th.t);
          const len  = Math.hypot(botX - topX, botY - topY);
          if (len < 1) continue;
          const dx = (botX - topX) / len, dy = (botY - topY) / len;
          const wave = Math.sin(t * th.wFreq * TAU + th.phase) * th.wAmp * sc;

          for (let k = 0; k < 2; k++) {
            const frac = ((t * th.speed + th.phase / TAU + k * 0.5) % 1.0);
            const env  = Math.sin(frac * Math.PI);
            const a    = th.alpha * env;
            if (a < 0.01) continue;

            const cx  = topX + (botX - topX) * frac + wave;
            const cy  = topY + (botY - topY) * frac;
            const hhl = len * 0.13;

            const hGr = ctx.createLinearGradient(
              cx - dx * hhl, cy - dy * hhl,
              cx + dx * hhl, cy + dy * hhl
            );
            hGr.addColorStop(0,   'rgba(210,242,255,0)');
            hGr.addColorStop(0.5, `rgba(225,248,255,${Math.min(0.99, a).toFixed(3)})`);
            hGr.addColorStop(1,   'rgba(210,242,255,0)');
            ctx.strokeStyle = hGr;
            ctx.lineWidth   = (1.0 + th.t * 0.6) * sc;
            ctx.beginPath();
            ctx.moveTo(cx - dx * hhl + wave * 0.15, cy - dy * hhl);
            ctx.lineTo(cx + dx * hhl - wave * 0.08, cy + dy * hhl);
            ctx.stroke();
          }
        }

        // Mist glow — left of bush (BL → BotL2)
        for (const m of mistL) {
          drawMist(ctx, t, lerp(bl.x, botL2.x, m.t), lerp(bl.y, botL2.y, m.t), m, 0.00056, 0.00140);
        }
        // Mist glow — right of bush (BotR → BR2)
        for (const m of mistR) {
          drawMist(ctx, t, lerp(botR.x, br2.x, m.t), lerp(botR.y, br2.y, m.t), m, 0.00062, 0.00148);
        }

        ctx.restore();
      }

      return { draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Spores / dust
    // ══════════════════════════════════════════════════════════════════════════
    const spores = (() => {
      const COUNT = 88;
      let pts = [];

      function make(startY) {
        const W = window.innerWidth, H = window.innerHeight;
        return {
          x: rnd(0, W), y: startY ?? rnd(0, H),
          vy: rnd(-0.20, -0.56), vx: rnd(-0.06, 0.06),
          r: rnd(0.6, 1.9), phase: rnd(0, TAU),
          freq: rnd(0.00090, 0.00265), op: rnd(0.08, 0.27),
          warm: Math.random() < 0.72,
        };
      }

      function init() {
        const H = window.innerHeight;
        pts = Array.from({ length: COUNT }, () => make(rnd(0, H)));
      }

      function update(dt, t) {
        const W = window.innerWidth, H = window.innerHeight;
        const step = dt / 16.667;
        for (const p of pts) {
          p.x += (p.vx + Math.sin(t * p.freq + p.phase) * 0.50) * step;
          p.y += p.vy * step;
          if (p.y < -12) { Object.assign(p, make(H + 8)); }
          if (p.x < -12) p.x = W + 12;
          if (p.x > W + 12) p.x = -12;
        }
      }

      function draw(ctx, t) {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (const p of pts) {
          const twinkle = 0.55 + 0.30 * Math.sin(t * p.freq * 3.2 + p.phase)
                               + 0.15 * Math.sin(t * p.freq * 7.8 + p.phase * 1.7);
          const alpha = p.op * twinkle;
          if (alpha < 0.018) continue;
          const [r, g, b] = p.warm ? [255, 230, 150] : [190, 255, 168];
          const gR  = p.r * 3.1;
          const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gR);
          grd.addColorStop(0,   `rgba(${r},${g},${b},${Math.min(0.999, alpha * 1.55).toFixed(3)})`);
          grd.addColorStop(0.5, `rgba(${r},${g},${b},${(alpha * 0.82).toFixed(3)})`);
          grd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(p.x, p.y, gR, 0, TAU);
          ctx.fill();
        }
        ctx.restore();
      }

      init();
      return { init, update, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Fireflies
    // ══════════════════════════════════════════════════════════════════════════
    const fireflies = (() => {
      const AMB_COUNT = 0, SURGE_COUNT = 42, SURGE_DUR = 20000, SURGE_FADE = 3200;
      let ambient = [], surge = [], surgeT0 = -Infinity;

      function makeFF(nyLo, nyHi) {
        const W = window.innerWidth, H = window.innerHeight;
        return {
          x: rnd(W * 0.04, W * 0.96), y: rnd(H * nyLo, H * nyHi),
          vx: rnd(-0.20, 0.20), vy: rnd(-0.12, 0.12),
          ax: rnd(-0.0038, 0.0038), ay: rnd(-0.0026, 0.0026),
          ph: rnd(0, TAU), freq: rnd(0.0028, 0.0082),
          r: rnd(3.5, 9.0), warm: Math.random() < 0.56,
        };
      }

      function init() { ambient = Array.from({ length: AMB_COUNT }, () => makeFF(0.28, 0.90)); }

      function triggerSurge() {
        surgeT0 = performance.now();
        surge   = Array.from({ length: SURGE_COUNT }, () => makeFF(0.18, 0.93));
      }

      function update(dt, now) {
        const W = window.innerWidth, H = window.innerHeight;
        const step = dt / 16.667;
        const all  = [...ambient];
        if (now - surgeT0 < SURGE_DUR + SURGE_FADE) all.push(...surge);
        for (const f of all) {
          f.vx += (f.ax + rnd(-0.002, 0.002)) * step;
          f.vy += (f.ay + rnd(-0.001, 0.001)) * step;
          f.vx  = clamp(f.vx, -0.30, 0.30);
          f.vy  = clamp(f.vy, -0.20, 0.20);
          f.x  += f.vx * step; f.y += f.vy * step;
          if (f.x < -40) f.x = W + 40;
          if (f.x > W + 40) f.x = -40;
          if (f.y < H * 0.12) f.vy =  Math.abs(f.vy) * 0.5;
          if (f.y > H * 0.97) f.vy = -Math.abs(f.vy) * 0.5;
        }
      }

      function draw(ctx, t, now) {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const surgeAge = now - surgeT0;
        const surgeA   = clamp(
          Math.min(surgeAge / SURGE_FADE, 1) * Math.max(0, 1 - (surgeAge - SURGE_DUR) / SURGE_FADE),
          0, 1
        );
        const sets = [{ list: ambient, fa: 1 }];
        if (surgeA > 0.005) sets.push({ list: surge, fa: surgeA });
        for (const { list, fa } of sets) {
          for (const f of list) {
            const blink = Math.max(0, Math.sin(t * f.freq + f.ph));
            const alpha = blink * blink * 0.52 * fa;
            if (alpha < 0.018) continue;
            const [r, g, b] = f.warm ? [255, 228, 72] : [112, 255, 90];
            const gR = f.r * (1.2 + blink * 1.0);
            const grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, gR);
            grd.addColorStop(0,    `rgba(${r},${g},${b},${Math.min(0.999, alpha * 1.8).toFixed(3)})`);
            grd.addColorStop(0.28, `rgba(${r},${g},${b},${alpha.toFixed(3)})`);
            grd.addColorStop(1,    `rgba(${r},${g},${b},0)`);
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.arc(f.x, f.y, gR, 0, TAU); ctx.fill();
            ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(0.999, alpha).toFixed(3)})`;
            ctx.beginPath(); ctx.arc(f.x, f.y, f.r * 0.35, 0, TAU); ctx.fill();
          }
        }
        ctx.restore();
      }

      init();
      return { init, update, draw, triggerSurge };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Bird flythrough
    // ══════════════════════════════════════════════════════════════════════════
    const bird = (() => {
      const DUR = 7500;
      const active = [];

      function trigger() {
        if (active.length > 0) return;
        active.push({ t0: performance.now(), dir: Math.random() < 0.5 ? 1 : -1 });
      }

      function drawSilhouette(ctx, sz, wAngle) {
        ctx.fillStyle = 'rgba(18,12,7,0.90)';
        ctx.beginPath(); ctx.ellipse(0, 0, sz * 0.30, sz * 0.10, 0, 0, TAU); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-sz * 0.26, sz * 0.02); ctx.lineTo(-sz * 0.54, sz * 0.12);
        ctx.lineTo(-sz * 0.29, sz * 0.14); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.arc(sz * 0.30, -sz * 0.02, sz * 0.10, 0, TAU); ctx.fill();
        ctx.save(); ctx.rotate(wAngle * 0.46);
        ctx.beginPath();
        ctx.moveTo(-sz * 0.04, -sz * 0.02);
        ctx.quadraticCurveTo(-sz * 0.62, -sz * (0.44 * (wAngle + 0.20) + 0.02), -sz * 1.06, sz * 0.04);
        ctx.quadraticCurveTo(-sz * 0.52,  sz * 0.09, -sz * 0.04, sz * 0.04);
        ctx.closePath(); ctx.fill(); ctx.restore();
        ctx.save(); ctx.rotate(-wAngle * 0.46);
        ctx.beginPath();
        ctx.moveTo(sz * 0.04, -sz * 0.02);
        ctx.quadraticCurveTo(sz * 0.62, -sz * (0.44 * (wAngle + 0.20) + 0.02), sz * 1.06, sz * 0.04);
        ctx.quadraticCurveTo(sz * 0.52,  sz * 0.09, sz * 0.04, sz * 0.04);
        ctx.closePath(); ctx.fill(); ctx.restore();
      }

      function draw(ctx, now) {
        if (!active.length) return;
        const a = active[0], et = now - a.t0;
        if (et >= DUR) { active.shift(); return; }
        const p = et / DUR;
        const W = window.innerWidth, H = window.innerHeight;
        const fadeIn  = p < 0.08 ? p / 0.08 : 1;
        const fadeOut = p > 0.90 ? (1 - p) / 0.10 : 1;
        const startX = a.dir > 0 ? -90 : W + 90;
        const endX   = a.dir > 0 ? W + 90 : -90;
        const cx = startX + (endX - startX) * p;
        const cy = H * 0.25 * (0.42 + 0.18 * Math.sin(p * Math.PI * 1.05 - 0.25));
        const wAngle = Math.sin(et * 0.01885);
        const sz = Math.min(W, H) * 0.021;
        ctx.save();
        ctx.globalAlpha = fadeIn * fadeOut;
        ctx.translate(cx, cy);
        if (a.dir < 0) ctx.scale(-1, 1);
        drawSilhouette(ctx, sz, wAngle);
        ctx.restore();
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Glow Surge — server core slowly brightens as old power cycles through.
    // ══════════════════════════════════════════════════════════════════════════
    const glowSurge = (() => {
      const DUR = 9000;
      let t0 = -Infinity;
      function trigger() { t0 = performance.now(); }
      function getMul(now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return 1;
        const p = age / DUR;
        const env = p < 0.25 ? p / 0.25 : p < 0.68 ? 1 : (1 - p) / 0.32;
        return 1 + 1.8 * env;
      }
      return { trigger, getMul };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Cable Spark — blue-white sparks from dangling cables near the server.
    // ══════════════════════════════════════════════════════════════════════════
    const cableSpark = (() => {
      const SPARK_DUR = 320;
      let sparks = [];

      function trigger() {
        if (!ANCHORS.serverCenter) return;
        const [cpx, cpy] = ANCHORS.serverCenter;
        const count = 2 + Math.floor(Math.random() * 3);
        const now = performance.now();
        for (let i = 0; i < count; i++) {
          sparks.push({
            t0:    now + i * 160 + rnd(0, 60),
            px:    cpx + rnd(-40, 30),
            py:    cpy + rnd(-15, 48),
            angle: rnd(-Math.PI * 0.45, Math.PI * 0.45),
            len:   rnd(9, 22),
          });
        }
      }

      function draw(ctx, now) {
        if (!sparks.length || !imgNaturalW) return;
        const alive = [];
        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        for (const s of sparks) {
          const age = now - s.t0;
          if (age < 0) { alive.push(s); continue; }
          if (age >= SPARK_DUR) continue;
          alive.push(s);

          const p     = age / SPARK_DUR;
          const alpha = p < 0.12 ? p / 0.12 : 1 - p;
          if (alpha < 0.02) continue;

          const c   = paintToCanvas(s.px, s.py);
          const sc  = coverScale().s;
          const len = s.len * sc;
          const ex  = c.x + Math.cos(s.angle) * len;
          const ey  = c.y + Math.sin(s.angle) * len;
          const mx  = (c.x + ex) * 0.5 + rnd(-len * 0.28, len * 0.28);
          const my  = (c.y + ey) * 0.5 + rnd(-len * 0.28, len * 0.28);

          ctx.globalAlpha  = alpha * 0.92;
          ctx.strokeStyle  = 'rgba(200,232,255,1)';
          ctx.lineWidth    = 1.8 * sc;
          ctx.shadowColor  = 'rgba(120,185,255,0.9)';
          ctx.shadowBlur   = 8 * sc;
          ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(mx, my); ctx.lineTo(ex, ey);
          ctx.stroke();

          const hr  = len * 0.58;
          const hrd = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, hr);
          hrd.addColorStop(0, `rgba(160,215,255,${(alpha * 0.52).toFixed(3)})`);
          hrd.addColorStop(1, 'rgba(60,120,255,0)');
          ctx.fillStyle  = hrd;
          ctx.shadowBlur = 0;
          ctx.beginPath(); ctx.arc(c.x, c.y, hr, 0, TAU); ctx.fill();
        }

        ctx.restore();
        sparks = alive;
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Data Drift — digital particles rising from server vents.
    // ══════════════════════════════════════════════════════════════════════════
    const dataDrift = (() => {
      const DUR = 11000, COUNT = 38;
      let t0 = -Infinity, pts = [];

      function trigger() {
        if (!ANCHORS.serverCenter || !imgNaturalW) return;
        t0 = performance.now();
        const c = paintToCanvas(...ANCHORS.serverCenter);
        pts = Array.from({ length: COUNT }, () => ({
          x: c.x + rnd(-62, 62), y: c.y + rnd(0, 28),
          vy: rnd(-0.5, -1.7), vx: rnd(-0.10, 0.10),
          r: rnd(1.2, 2.8), ph: rnd(0, TAU),
          freq: rnd(0.0025, 0.0065),
          warm: Math.random() < 0.28,
          delay: rnd(0, 2800),
        }));
      }

      function update(dt, now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return;
        const step = dt / 16.667;
        for (const p of pts) {
          if (age < p.delay) continue;
          p.x += (p.vx + Math.sin(now * p.freq + p.ph) * 0.28) * step;
          p.y += p.vy * step;
        }
      }

      function draw(ctx, now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return;
        const envFade = Math.min(age / 800, 1) * Math.min(1, (DUR - age) / 2000);
        if (envFade < 0.01) return;

        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        for (const p of pts) {
          if (age < p.delay) continue;
          const lifeAge  = age - p.delay;
          const lifeFade = Math.min(1, (DUR - p.delay - lifeAge) / 2000);
          const alpha    = 0.68 * lifeFade * envFade;
          if (alpha < 0.01) continue;

          const [r, g, b] = p.warm ? [255, 195, 70] : [70, 215, 255];
          const gR  = p.r * 3.8;
          const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gR);
          grd.addColorStop(0,   `rgba(${r},${g},${b},${Math.min(0.999, alpha * 2.1).toFixed(3)})`);
          grd.addColorStop(0.4, `rgba(${r},${g},${b},${alpha.toFixed(3)})`);
          grd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
          ctx.fillStyle = grd;
          ctx.beginPath(); ctx.arc(p.x, p.y, gR, 0, TAU); ctx.fill();
        }

        ctx.restore();
      }

      return { trigger, update, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Leaf sprites — shared by leafGust and fallingLeaf
    // ══════════════════════════════════════════════════════════════════════════
    const LEAF_IMGS = Array.from({ length: 10 }, (_, i) => {
      const img = new Image();
      img.src = `leaf_${String(i + 1).padStart(2, '0')}.png`;
      return img;
    });

    // ══════════════════════════════════════════════════════════════════════════
    //  Leaf Gust — burst of leaves sweeping across the lower foreground.
    // ══════════════════════════════════════════════════════════════════════════
    const leafGust = (() => {
      const DUR = 5500, COUNT = 22;
      let t0 = -Infinity, leaves = [], dir = 1;

      function trigger() {
        t0  = performance.now();
        dir = Math.random() < 0.5 ? 1 : -1;
        const W = window.innerWidth, H = window.innerHeight;
        leaves = Array.from({ length: COUNT }, () => ({
          x:      dir > 0 ? rnd(-80, -10) : rnd(W + 10, W + 80),
          y:      rnd(H * 0.54, H * 0.94),
          vx:     dir * rnd(1.8, 4.5),
          vy:     rnd(-0.6, 0.7),
          rot:    rnd(0, TAU),
          rotV:   rnd(-0.04, 0.055) * dir,
          sz:     H * rnd(0.022, 0.062),
          imgIdx: Math.floor(Math.random() * 10),
          delay:  rnd(0, 1800),
        }));
      }

      function update(dt, now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return;
        const step = dt / 16.667;
        for (const l of leaves) {
          if (age < l.delay) continue;
          l.x   += l.vx * step;
          l.y   += (l.vy + Math.sin(now * 0.0038 + l.rot) * 0.28) * step;
          l.rot += l.rotV * step;
        }
      }

      function draw(ctx, now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return;
        const env = Math.min(age / 400, 1) * Math.min(1, (DUR - age) / 600);
        if (env < 0.01) return;

        ctx.save();
        for (const l of leaves) {
          if (age < l.delay) continue;
          const img = LEAF_IMGS[l.imgIdx];
          if (!img.complete || !img.naturalWidth) continue;
          const half = l.sz * 0.5;
          ctx.save();
          ctx.globalAlpha = env * 0.90;
          ctx.translate(l.x, l.y);
          ctx.rotate(l.rot);
          ctx.drawImage(img, -half, -half, l.sz, l.sz);
          ctx.restore();
        }
        ctx.restore();
      }

      return { trigger, update, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Rain Drips — ambient light drizzle (intensity drifts between none and
    //  light); heavy downpour triggered as an event.
    // ══════════════════════════════════════════════════════════════════════════
    const rainDrips = (() => {
      // Ambient — a fine rain sheet plus foreground drips/splashes.
      const AMB_COUNT = 54, AMB_SHEET_COUNT = 260;
      const AMB_PH1 = rnd(0, TAU), AMB_PH2 = rnd(0, TAU);
      let ambPts = [], ambSheet = [];

      function makeAmbSheet(scattered) {
        const W = window.innerWidth, H = window.innerHeight;
        return {
          x: rnd(-W * 0.18, W * 1.08),
          y: scattered ? rnd(-H * 0.08, H * 1.08) : rnd(-H * 0.22, 0),
          vx: rnd(-1.7, -0.45),
          vy: rnd(8.5, 15.5),
          len: rnd(22, 44),
          a: rnd(0.45, 1.0),
        };
      }

      function makeAmbDrip(scattered) {
        const W = window.innerWidth, H = window.innerHeight;
        const floorY = H * rnd(0.72, 0.90);
        return {
          x: rnd(W * 0.03, W * 0.97),
          y: scattered ? rnd(0, floorY) : rnd(-H * 0.10, 0),
          vy: rnd(4.0, 7.2), len: rnd(12, 23), floorY,
          splashT: -Infinity, splashed: false,
        };
      }

      function initAmb() {
        ambPts = Array.from({ length: AMB_COUNT }, () => makeAmbDrip(true));
        ambSheet = Array.from({ length: AMB_SHEET_COUNT }, () => makeAmbSheet(true));
      }

      function ambIntensity(now) {
        const raw = Math.sin(now * 0.000095 + AMB_PH1) * Math.sin(now * 0.000143 + AMB_PH2);
        return clamp(0.42 + Math.max(0, raw) * 0.58, 0, 1);
      }

      // Heavy rain event
      const HEAVY_DUR = 6500, HEAVY_COUNT = 1500, HEAVY_MIST_COUNT = 14, HEAVY_SPLASH_COUNT = 90, HEAVY_FADE = 1400;
      let heavyT0 = -Infinity, heavyPts = [], heavyMist = [], heavySplashes = [];

      function makeHeavyStreak(scattered) {
        const W = window.innerWidth, H = window.innerHeight;
        return {
          x: rnd(-W * 0.16, W * 1.08),
          y: scattered ? rnd(-H * 0.10, H * 1.05) : rnd(-H * 0.18, 0),
          vx: rnd(-1.9, -0.55),
          vy: rnd(16, 31),
          len: rnd(18, 42),
          w: rnd(0.65, 1.35),
          a: rnd(0.46, 1.0),
        };
      }

      function makeHeavyMist(i) {
        const W = window.innerWidth, H = window.innerHeight;
        return {
          x: rnd(-W * 0.65, W * 1.10),
          y: rnd(-H * 0.08, H * 1.05),
          rx: W * rnd(0.22, 0.52),
          ry: H * rnd(0.12, 0.32),
          vx: rnd(0.45, 1.65),
          vy: rnd(-0.18, 0.18),
          rot: rnd(-0.28, 0.18),
          phase: i * 1.17 + rnd(0, TAU),
          a: rnd(0.14, 0.38),
        };
      }

      function trigger() {
        heavyT0 = performance.now();
        const W = window.innerWidth, H = window.innerHeight;
        heavyPts = Array.from({ length: HEAVY_COUNT }, () => makeHeavyStreak(true));
        heavyMist = Array.from({ length: HEAVY_MIST_COUNT }, (_, i) => makeHeavyMist(i));
        heavySplashes = Array.from({ length: HEAVY_SPLASH_COUNT }, () => ({
          x: rnd(W * 0.02, W * 0.98),
          floorY: H * rnd(0.73, 0.96),
          splashT: heavyT0 + rnd(-420, 900),
          nextIn: rnd(130, 520),
          scale: rnd(0.55, 1.45),
        }));
      }

      function update(dt, now) {
        const step = dt / 16.667;
        const W = window.innerWidth, H = window.innerHeight;

        for (const d of ambSheet) {
          d.x += d.vx * step;
          d.y += d.vy * step;
          if (d.y > H + d.len || d.x < -W * 0.25) Object.assign(d, makeAmbSheet(false));
        }

        for (const d of ambPts) {
          if (d.splashed) {
            if (now - d.splashT > 450) Object.assign(d, makeAmbDrip(false));
            continue;
          }
          d.y += d.vy * step;
          if (d.y > d.floorY) { d.splashed = true; d.splashT = now; }
        }

        const heavyAge = now - heavyT0;
        if (heavyAge >= 0 && heavyAge < HEAVY_DUR + HEAVY_FADE) {
          for (const d of heavyPts) {
            d.x += d.vx * step;
            d.y += d.vy * step;
            if (heavyAge < HEAVY_DUR && (d.y > H + d.len || d.x < -W * 0.28)) Object.assign(d, makeHeavyStreak(false));
          }

          if (heavyAge < HEAVY_DUR) {
            for (const b of heavyMist) {
              b.x += b.vx * step;
              b.y += b.vy * step;
              if (b.x > W + b.rx * 0.75) Object.assign(b, makeHeavyMist(0), { x: -b.rx * 1.25 });
            }

            for (const s of heavySplashes) {
              if (now - s.splashT > s.nextIn) {
                s.x = rnd(W * 0.02, W * 0.98);
                s.floorY = H * rnd(0.73, 0.96);
                s.splashT = now;
                s.nextIn = rnd(130, 520);
                s.scale = rnd(0.55, 1.45);
              }
            }
          }
        }
      }

      function draw(ctx, now) {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        // Ambient drizzle
        const ai = ambIntensity(now);
        if (ai > 0.01) {
          const baseAlpha = ai * 0.72;
          ctx.globalCompositeOperation = 'source-over';
          ctx.fillStyle = `rgba(64,92,108,${(ai * 0.085).toFixed(3)})`;
          ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

          ctx.globalCompositeOperation = 'screen';
          for (const d of ambSheet) {
            const alpha = baseAlpha * d.a * 0.58;
            ctx.strokeStyle = `rgba(170,215,232,${alpha.toFixed(3)})`;
            ctx.lineWidth = 0.9;
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            ctx.lineTo(d.x - d.vx * d.len * 0.34, d.y - d.len);
            ctx.stroke();
          }

          for (const d of ambPts) {
            if (d.splashed) {
              const sp = (now - d.splashT) / 450;
              if (sp < 1) {
                ctx.strokeStyle = `rgba(160,205,225,${(baseAlpha * (1 - sp) * 0.65).toFixed(3)})`;
                ctx.lineWidth = 0.7;
                ctx.beginPath();
                ctx.ellipse(d.x, d.floorY, sp * 6, sp * 2.0, 0, 0, TAU);
                ctx.stroke();
              }
              continue;
            }
            ctx.strokeStyle = `rgba(160,205,225,${baseAlpha.toFixed(3)})`;
            ctx.lineWidth = 1.15;
            ctx.beginPath();
            ctx.moveTo(d.x, d.y); ctx.lineTo(d.x + d.len * 0.14, d.y - d.len);
            ctx.stroke();
          }
        }

        // Heavy rain event
        const heavyAge = now - heavyT0;
        if (heavyAge >= 0 && heavyAge < HEAVY_DUR + HEAVY_FADE) {
          const env = Math.min(heavyAge / 750, 1) * Math.min(1, Math.max(0, (HEAVY_DUR - heavyAge) / HEAVY_FADE));
          if (env > 0.01) {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(34,52,62,${(env * 0.46).toFixed(3)})`;
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            ctx.fillStyle = `rgba(168,184,182,${(env * 0.10).toFixed(3)})`;
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            for (const b of heavyMist) {
              const wobbleX = Math.sin(now * 0.0011 + b.phase) * b.rx * 0.07;
              const wobbleY = Math.cos(now * 0.0017 + b.phase * 0.7) * b.ry * 0.10;
              const grd = ctx.createRadialGradient(
                b.x + wobbleX, b.y + wobbleY, 0,
                b.x + wobbleX, b.y + wobbleY, Math.max(b.rx, b.ry)
              );
              const a = env * b.a;
              grd.addColorStop(0, `rgba(190,202,198,${(a * 0.30).toFixed(3)})`);
              grd.addColorStop(0.38, `rgba(150,170,170,${(a * 0.18).toFixed(3)})`);
              grd.addColorStop(0.72, `rgba(100,124,132,${(a * 0.09).toFixed(3)})`);
              grd.addColorStop(1, 'rgba(110,130,136,0)');
              ctx.fillStyle = grd;
              ctx.save();
              ctx.translate(b.x + wobbleX, b.y + wobbleY);
              ctx.rotate(b.rot + Math.sin(now * 0.0007 + b.phase) * 0.05);
              ctx.beginPath();
              ctx.ellipse(0, 0, b.rx, b.ry, 0, 0, TAU);
              ctx.fill();
              ctx.restore();
            }

            ctx.globalCompositeOperation = 'source-over';

            for (const d of heavyPts) {
              const alpha = env * d.a * 0.88;
              if (alpha < 0.035) continue;
              ctx.strokeStyle = `rgba(218,238,242,${alpha.toFixed(3)})`;
              ctx.lineWidth = d.w;
              ctx.beginPath();
              ctx.moveTo(d.x, d.y);
              ctx.lineTo(d.x - d.vx * d.len * 0.24, d.y - d.len);
              ctx.stroke();
            }

            for (const s of heavySplashes) {
              const sp = (now - s.splashT) / 360;
              if (sp < 0 || sp >= 1) continue;
              const a = env * (1 - sp) * 0.48;
              ctx.strokeStyle = `rgba(185,225,238,${a.toFixed(3)})`;
              ctx.lineWidth = 1.0;
              ctx.beginPath();
              ctx.ellipse(s.x, s.floorY, sp * 20 * s.scale, sp * 4.6 * s.scale, 0, 0, TAU);
              ctx.stroke();
              if (sp < 0.45) {
                ctx.strokeStyle = `rgba(225,242,248,${(a * 0.8).toFixed(3)})`;
                ctx.beginPath();
                ctx.moveTo(s.x - 5 * s.scale, s.floorY - sp * 8 * s.scale);
                ctx.lineTo(s.x + 5 * s.scale, s.floorY - sp * 10 * s.scale);
                ctx.stroke();
              }
            }
          }
        }

        ctx.restore();
      }

      initAmb();
      return { initAmb, trigger, update, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Monitor Events — static, message flash, scanner sweep.
    //  Gated on ANCHORS.monitorScreen.
    //  MON_W / MON_H are approximate paint-pixel half-sizes — refine after anchoring.
    // ══════════════════════════════════════════════════════════════════════════
    const monitorEvents = (() => {
      const MON_W = 39, MON_H = 30;
      let staticT0 = -Infinity, messageT0 = -Infinity, scannerT0 = -Infinity;
      let currentMsg = 'SIGNAL LOST';
      const MSGS = ['SIGNAL LOST', 'REBOOTING...', 'LOW POWER', '> KERNEL PANIC', 'SYS OFFLINE', 'ERR: 0x4F'];

      function triggerStatic()  { if (ANCHORS.monitorScreen) staticT0  = performance.now(); }
      function triggerMessage() {
        if (!ANCHORS.monitorScreen) return;
        currentMsg = MSGS[Math.floor(Math.random() * MSGS.length)];
        messageT0  = performance.now();
      }
      function triggerScanner() { if (ANCHORS.monitorScreen) scannerT0 = performance.now(); }

      function monRect() {
        const c  = paintToCanvas(...ANCHORS.monitorScreen);
        const sc = coverScale().s;
        const hw = MON_W * sc * 0.5, hh = MON_H * sc * 0.5;
        return { cx: c.x, cy: c.y, x: c.x - hw, y: c.y - hh, w: MON_W * sc, h: MON_H * sc, sc };
      }

      function drawStatic(ctx, now) {
        const DUR = 4200, age = now - staticT0;
        if (age < 0 || age >= DUR) return;
        const p = age / DUR;
        const alpha = Math.min(p / 0.18, 1) * Math.min(1, (1 - p) / 0.15);
        if (alpha < 0.01) return;
        const m = monRect();
        ctx.save();
        ctx.globalAlpha = alpha * 0.80;
        ctx.fillStyle   = 'rgba(0,0,0,0.72)';
        ctx.fillRect(m.x, m.y, m.w, m.h);
        const cols = 26, rows = 18;
        const cw = m.w / cols, ch = m.h / rows;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const g = Math.floor(rnd(0, 210));
            ctx.fillStyle = `rgb(${g},${g},${g})`;
            ctx.fillRect(m.x + c * cw, m.y + r * ch, cw + 0.5, ch + 0.5);
          }
        }
        ctx.globalCompositeOperation = 'screen';
        const grd = ctx.createRadialGradient(m.cx, m.cy, 0, m.cx, m.cy, m.w * 0.68);
        grd.addColorStop(0, `rgba(100,175,110,${(alpha * 0.28).toFixed(3)})`);
        grd.addColorStop(1, 'rgba(30,90,40,0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.ellipse(m.cx, m.cy, m.w * 0.68, m.h * 0.58, 0, 0, TAU); ctx.fill();
        ctx.restore();
      }

      function drawMessage(ctx, now) {
        const DUR = 3000, age = now - messageT0;
        if (age < 0 || age >= DUR) return;
        const p = age / DUR;
        const alpha = Math.min(p / 0.12, 1) * Math.min(1, (1 - p) / 0.18);
        if (alpha < 0.01) return;
        const m = monRect();
        const fs = m.h * 0.155;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = 'rgba(0,10,2,0.88)';
        ctx.fillRect(m.x, m.y, m.w, m.h);
        ctx.globalAlpha    = alpha * (Math.random() < 0.04 ? 0.3 : 1);
        ctx.font           = `bold ${fs}px monospace`;
        ctx.textAlign      = 'center';
        ctx.textBaseline   = 'middle';
        ctx.fillStyle      = 'rgba(72,255,96,1)';
        ctx.shadowColor    = 'rgba(0,255,60,0.8)';
        ctx.shadowBlur     = fs * 0.4;
        ctx.fillText(currentMsg, m.cx, m.cy);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = alpha * 0.13;
        for (let y = m.y; y < m.y + m.h; y += 3) {
          ctx.fillStyle = 'rgba(0,0,0,0.55)';
          ctx.fillRect(m.x, y, m.w, 1.4);
        }
        ctx.restore();
      }

      function drawScanner(ctx, now) {
        const DUR = 3200, age = now - scannerT0;
        if (age < 0 || age >= DUR) return;
        const p = age / DUR;
        const alpha = Math.min(p / 0.12, 1) * Math.min(1, (1 - p) / 0.15);
        if (alpha < 0.01) return;
        const m = monRect();
        const lineY = m.y + m.h * ((p * 1.15) % 1.0);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = 'rgba(0,8,2,0.62)';
        ctx.fillRect(m.x, m.y, m.w, m.h);
        ctx.globalCompositeOperation = 'screen';
        const lg = ctx.createLinearGradient(m.cx, lineY - m.h * 0.065, m.cx, lineY + m.h * 0.065);
        lg.addColorStop(0,   'rgba(0,0,0,0)');
        lg.addColorStop(0.5, `rgba(72,225,115,${(alpha * 0.65).toFixed(3)})`);
        lg.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = lg;
        ctx.fillRect(m.x, lineY - m.h * 0.065, m.w, m.h * 0.13);
        ctx.restore();
      }

      function draw(ctx, now) {
        if (!ANCHORS.monitorScreen || !imgNaturalW) return;
        drawStatic(ctx, now);
        drawMessage(ctx, now);
        drawScanner(ctx, now);
      }

      return { triggerStatic, triggerMessage, triggerScanner, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Spore Cloud — soft puff from foreground mushrooms.
    //  Gated on ANCHORS.mushroomClump.
    // ══════════════════════════════════════════════════════════════════════════
    const sporeCloud = (() => {
      const DUR = 7000, COUNT = 68;
      let t0 = -Infinity, pts = [];

      function trigger() {
        if (!ANCHORS.mushroomClump || !imgNaturalW) return;
        t0 = performance.now();
        const c = paintToCanvas(...ANCHORS.mushroomClump);
        pts = Array.from({ length: COUNT }, () => {
          const ang = rnd(0, TAU), spd = rnd(0.25, 1.6);
          return {
            x: c.x + rnd(-8, 8), y: c.y + rnd(-4, 4),
            vx: Math.cos(ang) * spd * rnd(0.3, 1),
            vy: Math.sin(ang) * spd - rnd(0.35, 1.0),
            r: rnd(1.0, 3.2), delay: rnd(0, 380),
          };
        });
      }

      function update(dt, now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return;
        const step = dt / 16.667;
        for (const p of pts) {
          if (age < p.delay) continue;
          p.x  += p.vx * step; p.y += p.vy * step;
          p.vx *= 0.993; p.vy += 0.007 * step;
        }
      }

      function draw(ctx, now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return;
        const env = Math.min(age / 550, 1) * Math.min(1, (DUR - age) / 2500);
        if (env < 0.01) return;

        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        for (const p of pts) {
          if (age < p.delay) continue;
          const alpha = 0.52 * Math.min(1, (DUR - age) / 3000) * env;
          if (alpha < 0.01) continue;
          const gR  = p.r * 3.5;
          const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gR);
          grd.addColorStop(0,   `rgba(225,218,182,${Math.min(0.999, alpha * 2).toFixed(3)})`);
          grd.addColorStop(0.5, `rgba(205,198,158,${alpha.toFixed(3)})`);
          grd.addColorStop(1,   'rgba(182,172,122,0)');
          ctx.fillStyle = grd;
          ctx.beginPath(); ctx.arc(p.x, p.y, gR, 0, TAU); ctx.fill();
        }

        ctx.restore();
      }

      return { trigger, update, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Eyes Appear — reflective eyes inside a dark cavity.
    //  Gated on ANCHORS.darkCavity.
    // ══════════════════════════════════════════════════════════════════════════
    const eyesAppear = (() => {
      const DUR = 5500;
      let t0 = -Infinity, blink = false, blinkT = 0;

      function trigger() {
        if (!ANCHORS.darkCavity) return;
        t0 = performance.now(); blink = false;
      }

      function draw(ctx, now) {
        if (!ANCHORS.darkCavity || !imgNaturalW) return;
        const age = now - t0;
        if (age < 0 || age >= DUR) return;

        const p = age / DUR;
        let alpha = p < 0.18 ? p / 0.18 : p > 0.78 ? (1 - p) / 0.22 : 1;

        if (!blink && Math.random() < 0.004) { blink = true; blinkT = now; }
        if (blink) {
          const ba = (now - blinkT) / 80;
          alpha *= ba < 0.5 ? 1 - ba * 2 : (ba - 0.5) * 2;
          if (ba >= 1) blink = false;
        }
        if (alpha < 0.02) return;

        const c  = paintToCanvas(...ANCHORS.darkCavity);
        const sc = coverScale().s;
        const eR = 3.5 * sc, sep = 10 * sc;

        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = alpha;

        for (const ex of [c.x - sep * 0.5, c.x + sep * 0.5]) {
          const grd = ctx.createRadialGradient(ex, c.y, 0, ex, c.y, eR * 2.8);
          grd.addColorStop(0, 'rgba(255,192,52,0.9)');
          grd.addColorStop(0.4, 'rgba(218,142,22,0.5)');
          grd.addColorStop(1, 'rgba(120,60,0,0)');
          ctx.fillStyle = grd;
          ctx.beginPath(); ctx.arc(ex, c.y, eR * 2.8, 0, TAU); ctx.fill();

          ctx.fillStyle = 'rgba(255,222,82,0.95)';
          ctx.beginPath(); ctx.arc(ex, c.y, eR, 0, TAU); ctx.fill();

          ctx.fillStyle = 'rgba(10,5,0,0.92)';
          ctx.beginPath(); ctx.ellipse(ex, c.y, eR * 0.22, eR * 0.84, 0, 0, TAU); ctx.fill();
        }

        ctx.restore();
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Creature Scurry — small dark silhouette dashes across the lower scene.
    // ══════════════════════════════════════════════════════════════════════════
    const creatureScurry = (() => {
      const DUR = 3800;
      let t0 = -Infinity, dir = 1, groundFrac = 0.82;

      function trigger() {
        t0         = performance.now();
        dir        = Math.random() < 0.5 ? 1 : -1;
        groundFrac = rnd(0.78, 0.86);
      }

      function drawCreature(ctx, sc) {
        const w = 18 * sc, h = 8 * sc;
        ctx.fillStyle = 'rgba(14,9,4,0.90)';
        ctx.beginPath(); ctx.ellipse(0, 0, w * 0.50, h * 0.50, -0.12, 0, TAU); ctx.fill();
        ctx.beginPath(); ctx.arc(w * 0.42, -h * 0.05, h * 0.42, 0, TAU); ctx.fill();
        ctx.beginPath(); ctx.ellipse(w * 0.62, -h * 0.05, h * 0.22, h * 0.16, 0.18, 0, TAU); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-w * 0.44, h * 0.1);
        ctx.quadraticCurveTo(-w * 0.68, -h * 0.38, -w * 0.58, -h * 0.68);
        ctx.strokeStyle = 'rgba(14,9,4,0.90)';
        ctx.lineWidth   = h * 0.18;
        ctx.stroke();
      }

      function draw(ctx, now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return;
        const p = age / DUR;
        const W = window.innerWidth, H = window.innerHeight;
        const fadeIn  = p < 0.08 ? p / 0.08 : 1;
        const fadeOut = p > 0.88 ? (1 - p) / 0.12 : 1;
        const startX  = dir > 0 ? -42 : W + 42;
        const endX    = dir > 0 ? W + 42 : -42;
        const cx      = startX + (endX - startX) * p;
        const bobY    = Math.abs(Math.sin(age * 0.028)) * H * 0.006;
        const sc      = coverScale().s;

        ctx.save();
        ctx.globalAlpha = fadeIn * fadeOut;
        ctx.translate(cx, H * groundFrac - bobY);
        if (dir < 0) ctx.scale(-1, 1);
        drawCreature(ctx, sc);
        ctx.restore();
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Falling Leaf — a single leaf drifting down from the canopy.
    // ══════════════════════════════════════════════════════════════════════════
    const fallingLeaf = (() => {
      const DUR = 9000;
      let t0 = -Infinity, imgIdx = 0, startX = 0.5, sz = 64, rotStart = 0, rotEnd = 0;

      function trigger() {
        t0       = performance.now();
        imgIdx   = Math.floor(Math.random() * 10);
        startX   = rnd(0.18, 0.82);
        sz       = rnd(0.030, 0.055) * Math.min(window.innerWidth, window.innerHeight);
        rotStart = rnd(0, TAU);
        rotEnd   = rotStart + rnd(-TAU * 1.2, TAU * 1.2);
      }

      function draw(ctx, now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return;
        const p = age / DUR;
        const alpha = p < 0.06 ? p / 0.06 : p > 0.90 ? (1 - p) / 0.10 : 1;
        if (alpha < 0.01) return;

        const img = LEAF_IMGS[imgIdx];
        if (!img.complete || !img.naturalWidth) return;

        const W = window.innerWidth, H = window.innerHeight;
        const cx  = W * startX + Math.sin(p * Math.PI * 2.4) * W * 0.038;
        const cy  = H * (-0.03 + p * 1.06);
        const rot = rotStart + (rotEnd - rotStart) * p;
        const half = sz * 0.5;

        ctx.save();
        ctx.globalAlpha = alpha * 0.90;
        ctx.translate(cx, cy);
        ctx.rotate(rot);
        ctx.drawImage(img, -half, -half, sz, sz);
        ctx.restore();
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Sunbeam Shift — a dramatic extra god ray that drifts across the scene.
    // ══════════════════════════════════════════════════════════════════════════
    const sunbeamShift = (() => {
      const DUR = 13000;
      let t0 = -Infinity, startNX = 0.42, endNX = 0.55, angle0 = 0.10;

      function trigger() {
        t0       = performance.now();
        startNX  = rnd(0.22, 0.58);
        endNX    = startNX + rnd(-0.16, 0.16);
        angle0   = rnd(-0.04, 0.22);
      }

      function draw(ctx, now) {
        const age = now - t0;
        if (age < 0 || age >= DUR) return;
        const p   = age / DUR;
        const env = Math.min(p / 0.20, 1) * Math.min(1, (1 - p) / 0.25);
        if (env < 0.01) return;

        const W = window.innerWidth, H = window.innerHeight;
        const nx    = startNX + (endNX - startNX) * p;
        const ox    = nx * W, oy = H * 0.0;
        const len   = H * 1.34;
        const angle = angle0 + Math.sin(p * Math.PI) * 0.055;
        const rw    = W * (0.09 + 0.04 * Math.sin(p * Math.PI * 2.8));
        const ex    = ox + Math.sin(angle) * len, ey = oy + Math.cos(angle) * len;
        const perp  = angle + Math.PI * 0.5;
        const phx   = Math.cos(perp) * rw * 0.5, phy = Math.sin(perp) * rw * 0.5;
        const pulse = env * (0.70 + 0.22 * Math.sin(p * Math.PI));

        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const grad = ctx.createLinearGradient(ox, oy, ex, ey);
        grad.addColorStop(0,    `rgba(255,248,185,${(0.115 * pulse).toFixed(3)})`);
        grad.addColorStop(0.28, `rgba(248,225,115,${(0.058 * pulse).toFixed(3)})`);
        grad.addColorStop(0.68, `rgba(225,195, 72,${(0.022 * pulse).toFixed(3)})`);
        grad.addColorStop(1,    'rgba(200,162,40,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(ox - phx * 0.08, oy - phy * 0.08);
        ctx.lineTo(ox + phx * 0.08, oy + phy * 0.08);
        ctx.lineTo(ex + phx, ey + phy);
        ctx.lineTo(ex - phx, ey - phy);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Night Shift — scene darkens slowly, making glowing elements stand out.
    //  Controls the #night-overlay div opacity.
    // ══════════════════════════════════════════════════════════════════════════
    const nightShift = (() => {
      const DUR = 32000, FADE_IN = 8000, HOLD = 14000, FADE_OUT = 10000;
      let t0 = -Infinity;
      const el = document.getElementById('night-overlay');

      function trigger() { t0 = performance.now(); }

      function update(now) {
        const age = now - t0;
        if (age < 0) return;
        if (age >= DUR) { el.style.opacity = '0'; return; }
        let opacity;
        if (age < FADE_IN) {
          opacity = (age / FADE_IN) * 0.62;
        } else if (age < FADE_IN + HOLD) {
          opacity = 0.62;
        } else {
          opacity = (1 - (age - FADE_IN - HOLD) / FADE_OUT) * 0.62;
        }
        el.style.opacity = Math.max(0, opacity).toFixed(3);
      }

      return { trigger, update };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Power Arc — lightning bolt between two server modules.
    //  Gated on ANCHORS.serverCenter AND ANCHORS.serverRight.
    // ══════════════════════════════════════════════════════════════════════════
    const powerArc = (() => {
      const DUR = 1600, FLASHES = 3;
      let t0 = -Infinity;

      function trigger() {
        if (!ANCHORS.serverCenter || !ANCHORS.serverRight) return;
        t0 = performance.now();
      }

      function makePath(x1, y1, x2, y2) {
        const SEGS = 7;
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        const px = -dy / len, py = dx / len;
        const path = [{ x: x1, y: y1 }];
        for (let i = 1; i < SEGS; i++) {
          const tt = i / SEGS;
          const j  = (Math.random() - 0.5) * len * 0.13;
          path.push({ x: x1 + dx * tt + px * j, y: y1 + dy * tt + py * j });
        }
        path.push({ x: x2, y: y2 });
        return path;
      }

      function strokePath(ctx, path) {
        ctx.beginPath();
        ctx.moveTo(path[0].x, path[0].y);
        for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
        ctx.stroke();
      }

      function draw(ctx, now) {
        if (!ANCHORS.serverCenter || !ANCHORS.serverRight || !imgNaturalW) return;
        const age = now - t0;
        if (age < 0 || age >= DUR) return;

        const flashPeriod = DUR / FLASHES;
        const flashP = (age % flashPeriod) / flashPeriod;
        const alpha  = flashP < 0.18 ? flashP / 0.18 : 1 - flashP;
        if (alpha < 0.02) return;
        const envFade = Math.max(0, 1 - (age - DUR * 0.68) / (DUR * 0.32));

        const a  = paintToCanvas(...ANCHORS.serverCenter);
        const b  = paintToCanvas(...ANCHORS.serverRight);
        const sc = coverScale().s;

        const path = makePath(a.x, a.y, b.x, b.y);

        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = alpha * envFade;

        ctx.shadowColor = 'rgba(100,165,255,0.9)';
        ctx.shadowBlur  = 18 * sc;
        ctx.strokeStyle = 'rgba(115,180,255,0.72)';
        ctx.lineWidth   = 5 * sc;
        strokePath(ctx, path);

        ctx.shadowBlur  = 5 * sc;
        ctx.strokeStyle = 'rgba(222,242,255,1)';
        ctx.lineWidth   = 1.5 * sc;
        strokePath(ctx, path);

        ctx.shadowBlur = 0;
        for (const pt of [a, b]) {
          const grd = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, 20 * sc);
          grd.addColorStop(0, 'rgba(205,232,255,0.82)');
          grd.addColorStop(1, 'rgba(50,105,255,0)');
          ctx.fillStyle = grd;
          ctx.beginPath(); ctx.arc(pt.x, pt.y, 20 * sc, 0, TAU); ctx.fill();
        }

        ctx.restore();
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Fog Patches — permanent billowing ground mist drifting through the scene.
    // ══════════════════════════════════════════════════════════════════════════
    const fogPatches = (() => {
      // nx/ny: normalized screen center; rNx/rNy: ellipse radii as fraction of W/H;
      // dax/day: drift amplitude (normalized); dfx/dfy: drift frequency (rad/ms); ph: phase.
      const PATCHES = [
        { nx: 0.15, ny: 0.82, rNx: 0.185, rNy: 0.072, ph: 0.00, dax: 0.040, day: 0.014, dfx: 0.000178, dfy: 0.000238, a: 0.340 },
        { nx: 0.48, ny: 0.75, rNx: 0.205, rNy: 0.090, ph: 2.10, dax: 0.034, day: 0.019, dfx: 0.000212, dfy: 0.000182, a: 0.310 },
        { nx: 0.82, ny: 0.80, rNx: 0.162, rNy: 0.068, ph: 1.20, dax: 0.030, day: 0.013, dfx: 0.000162, dfy: 0.000255, a: 0.360 },
        { nx: 0.33, ny: 0.91, rNx: 0.152, rNy: 0.056, ph: 3.80, dax: 0.044, day: 0.011, dfx: 0.000196, dfy: 0.000292, a: 0.320 },
        { nx: 0.68, ny: 0.70, rNx: 0.138, rNy: 0.082, ph: 0.90, dax: 0.028, day: 0.017, dfx: 0.000242, dfy: 0.000158, a: 0.280 },
        { nx: 0.24, ny: 0.62, rNx: 0.120, rNy: 0.062, ph: 5.20, dax: 0.026, day: 0.021, dfx: 0.000176, dfy: 0.000214, a: 0.230 },
        { nx: 0.76, ny: 0.65, rNx: 0.132, rNy: 0.060, ph: 4.48, dax: 0.032, day: 0.015, dfx: 0.000204, dfy: 0.000188, a: 0.250 },
      ];

      function draw(ctx, t) {
        const W = window.innerWidth, H = window.innerHeight;
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (const p of PATCHES) {
          const cx = (p.nx + Math.sin(t * p.dfx + p.ph)        * p.dax) * W;
          const cy = (p.ny + Math.cos(t * p.dfy + p.ph * 0.78) * p.day) * H;
          const breathe = 0.56 + 0.28 * Math.sin(t * 0.000124 + p.ph)
                               + 0.16 * Math.sin(t * 0.000276 + p.ph * 1.55);
          const alpha = p.a * breathe;
          if (alpha < 0.008) continue;
          const rx = p.rNx * W;
          const ry = p.rNy * H;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.scale(1, ry / rx);
          const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
          grd.addColorStop(0,    `rgba(205,222,218,${Math.min(0.999, alpha * 1.35).toFixed(3)})`);
          grd.addColorStop(0.40, `rgba(195,215,210,${alpha.toFixed(3)})`);
          grd.addColorStop(0.72, `rgba(185,208,202,${(alpha * 0.52).toFixed(3)})`);
          grd.addColorStop(1,    'rgba(175,200,195,0)');
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(0, 0, rx, 0, TAU);
          ctx.fill();
          ctx.restore();
        }
        ctx.restore();
      }

      return { draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Draw order
    // ══════════════════════════════════════════════════════════════════════════
    function drawEffects(dt, t, now) {
      fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

      godRays.draw(fxCtx, t);
      sunbeamShift.draw(fxCtx, now);
      serverGlow.draw(fxCtx, t, glitchMul * glowSurge.getMul(now));
      waterfall.draw(fxCtx, t);
      fogPatches.draw(fxCtx, t);
      cableSpark.draw(fxCtx, now);
      powerArc.draw(fxCtx, now);
      dataDrift.update(dt, now);
      dataDrift.draw(fxCtx, now);
      spores.update(dt, t);
      spores.draw(fxCtx, t);
      sporeCloud.update(dt, now);
      sporeCloud.draw(fxCtx, now);
      fireflies.update(dt, now);
      fireflies.draw(fxCtx, t, now);
      monitorEvents.draw(fxCtx, now);
      eyesAppear.draw(fxCtx, now);
      bird.draw(fxCtx, now);
      leafGust.update(dt, now);
      leafGust.draw(fxCtx, now);
      fallingLeaf.draw(fxCtx, now);
      creatureScurry.draw(fxCtx, now);
      rainDrips.update(dt, now);
      rainDrips.draw(fxCtx, now);
      nightShift.update(now);
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  Main loop
    // ══════════════════════════════════════════════════════════════════════════
    let t    = 0;
    let last = performance.now();

    function frame(now) {
      const dt = Math.min(now - last, 50);
      last = now;
      t   += dt;

      if (glitchTimer > 0) {
        glitchTimer -= dt;
        glitchMul = Math.random() < 0.28
          ? 0.04 + Math.random() * 0.12
          : 0.55 + Math.random() * 0.45;
        if (glitchTimer <= 0) { glitchTimer = 0; glitchMul = 1; }
      }

      drawEffects(dt, t, now);
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);

    // ══════════════════════════════════════════════════════════════════════════
    //  Debug mode — append ?debug to URL.
    // ══════════════════════════════════════════════════════════════════════════
    const debugMode  = new URLSearchParams(location.search).has('debug');
    const dbgPanel   = document.getElementById('dbg-panel');
    const dbgOverlay = document.getElementById('dbg-overlay');
    const debugPins  = [];

    function updateDebugPanel(msg) { dbgPanel.textContent = msg; }

    function redrawDebugPins() {
      if (!debugMode) return;
      dbgCtx.clearRect(0, 0, dbgCanvas.width, dbgCanvas.height);
      dbgCtx.font = '11px monospace';
      dbgCtx.lineWidth = 1;
      for (const p of debugPins) {
        const { x, y } = paintToCanvas(p.px, p.py);
        dbgCtx.strokeStyle = 'rgba(255,0,220,0.85)';
        dbgCtx.beginPath();
        dbgCtx.moveTo(x - 10, y); dbgCtx.lineTo(x + 10, y);
        dbgCtx.moveTo(x, y - 10); dbgCtx.lineTo(x, y + 10);
        dbgCtx.stroke();
        dbgCtx.fillStyle = 'rgba(255,0,220,0.9)';
        dbgCtx.beginPath(); dbgCtx.arc(x, y, 3, 0, TAU); dbgCtx.fill();
        const label = p.label || `(${p.px},${p.py})`;
        dbgCtx.fillStyle = 'rgba(0,0,0,0.6)';
        dbgCtx.fillRect(x + 6, y - 14, label.length * 6.5 + 6, 16);
        dbgCtx.fillStyle = '#0f0';
        dbgCtx.fillText(label, x + 9, y - 2);
      }
    }

    if (debugMode) {
      dbgPanel.style.display   = 'block';
      dbgOverlay.style.display = 'block';
      updateDebugPanel(imgNaturalW
        ? `Image: ${imgNaturalW}×${imgNaturalH}\nClick to capture paint coords.`
        : 'Loading image dimensions…');
      let pinCount = 0;
      dbgOverlay.addEventListener('click', e => {
        if (!imgNaturalW) { updateDebugPanel('Image not loaded yet — wait a moment.'); return; }
        const { px, py } = canvasToPaint(e.clientX, e.clientY);
        pinCount++;
        const label = `${pinCount}: (${px},${py})`;
        debugPins.push({ px, py, label });
        console.log(`[debug] pin ${pinCount}: [${px}, ${py}]`);
        updateDebugPanel(
          `Image: ${imgNaturalW}×${imgNaturalH}  Screen: ${window.innerWidth}×${window.innerHeight}\n` +
          `Last click: [${px}, ${py}]  (pin ${pinCount})\n\n` +
          debugPins.map(p => `  ${p.label}`).join('\n')
        );
        redrawDebugPins();
      });
      dbgOverlay.addEventListener('contextmenu', e => {
        e.preventDefault();
        debugPins.length = 0; pinCount = 0;
        dbgCtx.clearRect(0, 0, dbgCanvas.width, dbgCanvas.height);
        updateDebugPanel(`Image: ${imgNaturalW}×${imgNaturalH}\nPins cleared. Click to capture.`);
      });
    }
  </script>
</body>
</html>
