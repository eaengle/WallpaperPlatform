<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050a14; }
    #bg {
      position: fixed;
      inset: 0;
      background: url('cabin.png') center / cover no-repeat;
    }
    #snow-far, #snow-near, #effects, #dbg-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    #snow-near {
      filter: blur(2.5px);
    }
    /* debug overlay captures clicks above everything */
    #dbg-overlay {
      position: fixed;
      inset: 0;
      cursor: crosshair;
      z-index: 9000;
      display: none;
    }
    #dbg-panel {
      position: fixed;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.72);
      color: #0f0;
      font: 12px/1.6 monospace;
      padding: 8px 10px;
      border-radius: 4px;
      z-index: 9999;
      pointer-events: none;
      display: none;
      max-width: 420px;
      white-space: pre;
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <canvas id="snow-far"></canvas>
  <canvas id="effects"></canvas>
  <canvas id="snow-near"></canvas>
  <canvas id="dbg-canvas"></canvas>
  <div id="dbg-overlay"></div>
  <div id="dbg-panel"></div>


  <script>
    // ══════════════════════════════════════════════════════════════════════════
    //  Image-anchor system
    //  paintToCanvas(px, py) — converts image-pixel coords to screen coords,
    //  accounting for CSS background-size:cover scaling on any monitor.
    // ══════════════════════════════════════════════════════════════════════════
    let imgNaturalW = 0, imgNaturalH = 0;

    const _probe = new Image();
    _probe.onload = () => {
      imgNaturalW = _probe.naturalWidth;
      imgNaturalH = _probe.naturalHeight;
      if (debugMode) updateDebugPanel(`Image loaded: ${imgNaturalW}×${imgNaturalH}\nClick anywhere to capture paint coords.`);
    };
    _probe.src = 'cabin.png';

    function coverScale() {
      const W = window.innerWidth, H = window.innerHeight;
      const s  = Math.max(W / imgNaturalW, H / imgNaturalH);
      const ox = (W - imgNaturalW * s) / 2;
      const oy = (H - imgNaturalH * s) / 2;
      return { s, ox, oy };
    }

    // Convert image-pixel (px, py) → canvas/screen pixel
    function paintToCanvas(px, py) {
      if (!imgNaturalW) return { x: px, y: py };
      const { s, ox, oy } = coverScale();
      return { x: px * s + ox, y: py * s + oy };
    }

    // Convert screen click → image-pixel (inverse, for debug mode)
    function canvasToPaint(sx, sy) {
      if (!imgNaturalW) return { px: 0, py: 0 };
      const { s, ox, oy } = coverScale();
      return { px: Math.round((sx - ox) / s), py: Math.round((sy - oy) / s) };
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  Anchor definitions — measured via ?debug click tool
    //  Format: [paintX, paintY] in original image pixels
    //  Leave as null until you've measured them with the debug tool.
    // ══════════════════════════════════════════════════════════════════════════
    const ANCHORS = {
      chimneyTop:    [901,  540],
      leftWindow:    [766,  679],
      rightWindow:   [888,  679],
      groundLevel:   [828,  743],
      leftRoofEdge:  [704,  632],
      rightRoofEdge: [953,  631],
      leftTreeTop:   [217,  328],
      rightTreeTop:  [1505, 311],
      pondCorner:    [591,  839],
      boulderCenter: [1394, 763],
      // Bottom-center pin for each window — measure with ?debug, then fill in.
      leftWindowShadowPin:  [759, 704],
      rightWindowShadowPin: [878, 703],
      // Owl perch point on the left tree — measure with ?debug, then fill in.
      owlPerch: [218, 468],
      // Rabbit pause point and boulder detour — measured via ?debug.
      rabbitGround:          [783, 769],
      rabbitBoulderApproach: [1290, 783],
      rabbitBoulderBottom:   [1348, 836],
      // Deer foreground ground — null falls back to groundLevel.
      deerGround: null,
    };

    // ══════════════════════════════════════════════════════════════════════════
    //  Canvas setup
    // ══════════════════════════════════════════════════════════════════════════
    const farCanvas    = document.getElementById('snow-far');
    const nearCanvas   = document.getElementById('snow-near');
    const fxCanvas     = document.getElementById('effects');
    const dbgCanvas    = document.getElementById('dbg-canvas');
    const farCtx       = farCanvas.getContext('2d');
    const nearCtx      = nearCanvas.getContext('2d');
    const fxCtx        = fxCanvas.getContext('2d');
    const dbgCtx       = dbgCanvas.getContext('2d');

    function resize() {
      const W = window.innerWidth, H = window.innerHeight;
      for (const c of [farCanvas, nearCanvas, fxCanvas, dbgCanvas]) {
        c.width = W; c.height = H;
      }
    }
    resize();
    window.addEventListener('resize', () => { resize(); initFlakes(); stars.init(); smoke.init(); redrawDebugPins(); });

    function rnd(min, max) { return min + Math.random() * (max - min); }
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
    const TAU = Math.PI * 2;

    // ══════════════════════════════════════════════════════════════════════════
    //  Weather state — smoothly lerped each frame
    // ══════════════════════════════════════════════════════════════════════════
    let targetSnow    = 0.7;
    let targetWindX   = 0;
    let targetWindStr = 0;
    let curSnow       = 0.7;
    let curWindX      = 0;
    let curWindStr    = 0;

    // ══════════════════════════════════════════════════════════════════════════
    //  Event state — driven by C# WallpaperEventBridge
    // ══════════════════════════════════════════════════════════════════════════
    let weatherPaused = false;   // suppresses weather updates during scene events

    // Blizzard surge: override snow/wind for a timed burst
    let blizzardTimer = 0;       // ms remaining

    function triggerBlizzard() {
      weatherPaused = true;
      targetSnow    = 2.6;
      targetWindStr = 1.9;
      targetWindX   = (Math.random() < 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.5);
      blizzardTimer = 13000;
    }

    // Cabin power flicker: rapid light stutter on the windows
    let flickerMul   = 1;        // multiplied into window glow brightness
    let flickerTimer = 0;        // ms remaining

    function triggerCabinFlicker() {
      flickerTimer = 2800;
    }

    // Event dispatcher — called from message listener below
    function handleSceneEvent(name /*, data*/) {
      switch (name) {
        case 'shooting_star':  shootingStar.trigger();  break;
        case 'blizzard_surge': triggerBlizzard();        break;
        case 'cabin_flicker':  triggerCabinFlicker();    break;
        case 'window_shadow':  windowShadow.trigger();   break;
        case 'owl_swoop':      owl.trigger();             break;
        case 'rabbit_hop':     rabbit.trigger();          break;
        case 'deer_walk':      deer.trigger();            break;
      }
    }

    window.chrome?.webview?.addEventListener('message', e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'weather' && !weatherPaused) {
          targetSnow    = msg.snow;
          targetWindX   = msg.windX;
          targetWindStr = msg.wind;
        } else if (msg.type === 'event') {
          handleSceneEvent(msg.name, msg.data);
        }
      } catch {}
    });

    // ══════════════════════════════════════════════════════════════════════════
    //  Snow — far layer
    // ══════════════════════════════════════════════════════════════════════════
    const FAR_COUNT = 300;

    function makeFarFlake() {
      return {
        x:       Math.random() * farCanvas.width,
        y:       Math.random() * farCanvas.height,
        r:       rnd(0.5, 1.9),
        vy:      rnd(0.55, 1.5),
        phase:   Math.random() * Math.PI * 2,
        freq:    rnd(0.35, 0.85),
        amp:     rnd(0.25, 1.1),
        opacity: rnd(0.35, 0.80),
        sparkle: 0,
      };
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  Snow — near (bokeh) layer
    // ══════════════════════════════════════════════════════════════════════════
    const NEAR_COUNT = 50;

    function makeNearFlake() {
      return {
        x:       Math.random() * nearCanvas.width,
        y:       Math.random() * nearCanvas.height,
        r:       rnd(3.5, 10),
        vy:      rnd(0.12, 0.42),
        phase:   Math.random() * Math.PI * 2,
        freq:    rnd(0.18, 0.48),
        amp:     rnd(1.5, 4.5),
        opacity: rnd(0.22, 0.50),
      };
    }

    let farFlakes = [], nearFlakes = [];

    function initFlakes() {
      farFlakes  = Array.from({ length: FAR_COUNT  }, makeFarFlake);
      nearFlakes = Array.from({ length: NEAR_COUNT }, makeNearFlake);
    }
    initFlakes();

    // ══════════════════════════════════════════════════════════════════════════
    //  Ambient wind
    // ══════════════════════════════════════════════════════════════════════════
    function ambientWind(t) {
      return Math.sin(t * 0.00023) * 0.30 + Math.sin(t * 0.00053) * 0.18;
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  Chimney smoke
    // ══════════════════════════════════════════════════════════════════════════
    const smoke = (() => {
      let puffs = [];

      function spawnPos() {
        return ANCHORS.chimneyTop ? paintToCanvas(...ANCHORS.chimneyTop)
                                  : { x: window.innerWidth * 0.5, y: window.innerHeight * 0.4 };
      }

      function spawn(ageFraction = 0) {
        const { x, y } = spawnPos();
        const maxLife = rnd(6.0, 10.0);
        const initSz  = rnd(4, 8);
        return {
          x:       x + rnd(-3, 3),
          y,
          vx:      rnd(-2, 4),
          vy:      rnd(-28, -16),
          initSz,
          sz:      initSz,
          maxSz:   rnd(28, 46),
          life:    ageFraction * maxLife,
          maxLife,
          warm:    rnd(0.3, 0.9),
          phase:   Math.random() * TAU,
        };
      }

      function init() {
        puffs = Array.from({ length: 26 }, (_, i) => spawn(i / 26));
      }

      function update(dt, t) {
        const s        = dt * 0.001;
        const windPush = curWindX * curWindStr * 18;

        for (const p of puffs) {
          p.life += s;
          const prog      = Math.max(0, p.life / p.maxLife);
          const turbScale = clamp((prog - 0.30) / 0.55, 0, 1);

          const tx = (Math.sin(t * 0.65 + p.phase + p.y * 0.003) * 8
                   +  Math.cos(t * 0.37 + p.x * 0.005) * 5) * turbScale;
          const ty =  Math.cos(t * 0.50 + p.phase) * 3 * turbScale;

          p.vx += (tx + windPush) * s;
          p.vy += ty * s;
          p.vx *= 1 - s * 0.22;
          p.vy *= 1 - s * 0.12;
          p.x  += p.vx * s;
          p.y  += p.vy * s;

          const ease = 1 - (1 - Math.min(prog, 1)) ** 2;
          p.sz = p.initSz + (p.maxSz - p.initSz) * ease;

          if (p.life > p.maxLife) Object.assign(p, spawn(0));
        }
      }

      function draw(ctx) {
        ctx.save();
        for (const p of puffs) {
          if (p.sz < 1) continue;
          const prog = Math.max(0, Math.min(1, p.life / p.maxLife));

          let fade;
          if (prog < 0.12)      fade = prog / 0.12;
          else if (prog < 0.58) fade = 1;
          else                  fade = 1 - (prog - 0.58) / 0.42;

          const alpha = 0.18 * fade * fade;
          if (alpha < 0.003) continue;

          const w = p.warm * Math.max(0, 1 - prog * 0.85);
          const r = Math.round(155 + w * 18);
          const g = Math.round(152 + w * 10);
          const b = 162;

          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.sz);
          grad.addColorStop(0,    `rgba(${r},${g},${b},${Math.min(0.999, alpha * 1.7).toFixed(3)})`);
          grad.addColorStop(0.45, `rgba(${r},${g},${b},${alpha.toFixed(3)})`);
          grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);

          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.sz, 0, TAU);
          ctx.fill();
        }
        ctx.restore();
      }

      return { init, update, draw };
    })();

    smoke.init();

    // ══════════════════════════════════════════════════════════════════════════
    //  Shooting star
    // ══════════════════════════════════════════════════════════════════════════
    const shootingStar = (() => {
      const active = [];

      function trigger() {
        const W = window.innerWidth;
        // Sky boundary: same calculation as stars module
        const skyBot = imgNaturalW
          ? paintToCanvas(...(ANCHORS.leftTreeTop[1] < ANCHORS.rightTreeTop[1]
              ? ANCHORS.leftTreeTop : ANCHORS.rightTreeTop)).y * 0.96
          : window.innerHeight * 0.55;

        const sx    = W * (0.05 + Math.random() * 0.9);
        const sy    = skyBot * (0.05 + Math.random() * 0.50);
        const len   = 180 + Math.random() * 120;
        const pitch = Math.PI * (0.08 + Math.random() * 0.18); // 14–46° below horizontal
        const dir   = Math.random() < 0.5 ? 1 : -1;

        active.push({
          sx, sy,
          dx: dir * Math.cos(pitch) * len,
          dy: Math.sin(pitch) * len,
          t0:  performance.now(),
          dur: 700 + Math.random() * 500,
        });
      }

      function draw(ctx, now) {
        for (let i = active.length - 1; i >= 0; i--) {
          const s    = active[i];
          const prog = (now - s.t0) / s.dur;
          if (prog >= 1) { active.splice(i, 1); continue; }

          // Fade envelope: quick in, hold, fade out
          let alpha;
          if      (prog < 0.12) alpha = prog / 0.12;
          else if (prog < 0.65) alpha = 1;
          else                  alpha = 1 - (prog - 0.65) / 0.35;

          const headX = s.sx + s.dx * prog;
          const headY = s.sy + s.dy * prog;
          const tailT = Math.max(0, prog - 0.30);
          const tailX = s.sx + s.dx * tailT;
          const tailY = s.sy + s.dy * tailT;

          ctx.save();
          ctx.globalCompositeOperation = 'screen';

          // Streak trail
          const trail = ctx.createLinearGradient(tailX, tailY, headX, headY);
          trail.addColorStop(0,   'rgba(255,255,255,0)');
          trail.addColorStop(0.5, `rgba(210,230,255,${(alpha * 0.45).toFixed(3)})`);
          trail.addColorStop(1,   `rgba(255,255,255,${(alpha * 0.88).toFixed(3)})`);
          ctx.strokeStyle = trail;
          ctx.lineWidth   = 1.8;
          ctx.lineCap     = 'round';
          ctx.beginPath();
          ctx.moveTo(tailX, tailY);
          ctx.lineTo(headX, headY);
          ctx.stroke();

          // Bright head glow
          const gr = ctx.createRadialGradient(headX, headY, 0, headX, headY, 9);
          gr.addColorStop(0,   `rgba(255,255,255,${(alpha * 0.95).toFixed(3)})`);
          gr.addColorStop(0.3, `rgba(220,235,255,${(alpha * 0.60).toFixed(3)})`);
          gr.addColorStop(1,   'rgba(200,220,255,0)');
          ctx.fillStyle = gr;
          ctx.beginPath();
          ctx.arc(headX, headY, 9, 0, TAU);
          ctx.fill();

          ctx.restore();
        }
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Stars
    // ══════════════════════════════════════════════════════════════════════════
    const stars = (() => {
      let _stars  = null;
      let _skyBot = 0;

      function init() {
        // Use the higher of the two tree tops as the sky/silhouette boundary
        const higher = ANCHORS.leftTreeTop[1] < ANCHORS.rightTreeTop[1]
                     ? ANCHORS.leftTreeTop : ANCHORS.rightTreeTop;
        _skyBot = paintToCanvas(...higher).y * 0.96;

        if (_stars) return;  // seed once — normalized coords scale with any viewport
        _stars = [
          // 5 prominent focal stars
          ...Array.from({ length: 5 }, () => ({
            nx: Math.random(), ny: Math.random() * 0.82,
            r:   rnd(1.8, 3.0),
            f1:  rnd(0.00020, 0.00058), f2: rnd(0.00120, 0.00260),
            ph1: rnd(0, TAU),           ph2: rnd(0, TAU),
            base: rnd(0.65, 0.90),
            rgb: Math.random() < 0.30 ? [212, 228, 255] : [255, 253, 242],
          })),
          // 50 background stars
          ...Array.from({ length: 50 }, () => ({
            nx: Math.random(), ny: Math.random() * 0.97,
            r:   rnd(0.5, 1.6),
            f1:  rnd(0.00028, 0.00110), f2: rnd(0.00160, 0.00400),
            ph1: rnd(0, TAU),           ph2: rnd(0, TAU),
            base: rnd(0.30, 0.75),
            rgb: Math.random() < 0.18 ? [200, 220, 255]
               : Math.random() < 0.10 ? [255, 228, 168]
               : [255, 253, 242],
          })),
        ];
      }

      function draw(ctx, t) {
        if (!_stars || _skyBot <= 0) return;
        const W = window.innerWidth;
        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        for (const s of _stars) {
          const sx = s.nx * W;
          const sy = s.ny * _skyBot;

          const tw = 0.50 + 0.30 * Math.sin(t * s.f1 + s.ph1)
                          + 0.20 * Math.sin(t * s.f2 + s.ph2);
          const brightness = clamp(s.base * tw, 0, 1);
          if (brightness < 0.02) continue;

          const [r, g, b] = s.rgb;

          // Soft glow corona
          const glowR = s.r * 4.5;
          const ga    = brightness * 0.38;
          const glow  = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
          glow.addColorStop(0,    `rgba(${r},${g},${b},${Math.min(0.999, ga * 1.7).toFixed(3)})`);
          glow.addColorStop(0.40, `rgba(${r},${g},${b},${ga.toFixed(3)})`);
          glow.addColorStop(1,    `rgba(${r},${g},${b},0)`);
          ctx.fillStyle = glow;
          ctx.beginPath(); ctx.arc(sx, sy, glowR, 0, TAU); ctx.fill();

          // Sharp center point
          ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(0.999, brightness * 0.85).toFixed(3)})`;
          ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, TAU); ctx.fill();
        }

        ctx.restore();
      }

      return { init, draw };
    })();

    stars.init();

    // ══════════════════════════════════════════════════════════════════════════
    //  Window glow
    // ══════════════════════════════════════════════════════════════════════════
    const windowGlow = (() => {
      const _phase = Math.random() * TAU;

      function draw(ctx, t) {
        if (!imgNaturalW) return;

        const lPos = paintToCanvas(...ANCHORS.leftWindow);
        const rPos = paintToCanvas(...ANCHORS.rightWindow);
        const W    = window.innerWidth;
        const H    = window.innerHeight;
        // Size the glow relative to the gap between the two windows
        const { s } = coverScale();
        const ww = 40 * s;   // ~40 image-px half-width, scaled
        const wh = 50 * s;   // ~50 image-px half-height

        // Four-frequency candle flicker — incommensurate freqs produce irregular beat
        // (frequencies in rad/ms — Momentarium's rad/s values ÷ 1000)
        const flicker = ph =>
            0.55
          + 0.20 * Math.sin(t * 0.00038 + ph)
          + 0.15 * Math.sin(t * 0.00230 + ph * 1.4)
          + 0.09 * Math.sin(t * 0.00610 + ph * 2.3)
          + 0.06 * Math.sin(t * 0.01370 + ph * 4.1);

        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        for (const [pos, ph] of [[lPos, _phase], [rPos, _phase + 2.1]]) {
          const { x: cx, y: cy } = pos;
          const pulse = flicker(ph) * flickerMul;

          // Amber radial halo centered on the window
          const glowR = ww * 2.6;
          const ga    = 0.13 * pulse;
          const halo  = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
          halo.addColorStop(0,    `rgba(255,195, 75,${(ga * 1.9).toFixed(3)})`);
          halo.addColorStop(0.30, `rgba(255,165, 45,${ga.toFixed(3)})`);
          halo.addColorStop(0.65, `rgba(220,115, 18,${(ga * 0.32).toFixed(3)})`);
          halo.addColorStop(1,    'rgba(200,80,0,0)');
          ctx.fillStyle = halo;
          ctx.beginPath(); ctx.arc(cx, cy, glowR, 0, TAU); ctx.fill();

          // Warm cone of light spilling down onto snow below each window
          const spillTop  = cy + wh * 0.5;
          const spillLen  = wh * 3.8 * pulse;
          const spillBot  = spillTop + spillLen;
          const spreadTop = ww * 0.38;
          const spreadBot = ww * 1.9 * pulse;
          const sa        = 0.048 * pulse;
          const spill = ctx.createLinearGradient(cx, spillTop, cx, spillBot);
          spill.addColorStop(0, `rgba(255,175,55,${sa.toFixed(3)})`);
          spill.addColorStop(1, 'rgba(255,130,20,0)');
          ctx.fillStyle = spill;
          ctx.beginPath();
          ctx.moveTo(cx - spreadTop, spillTop);
          ctx.lineTo(cx + spreadTop, spillTop);
          ctx.lineTo(cx + spreadBot, spillBot);
          ctx.lineTo(cx - spreadBot, spillBot);
          ctx.closePath(); ctx.fill();
        }

        ctx.restore();
      }

      return { draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Window shadow — silhouette figure appearing briefly in a cabin window.
    //  The source PNG has a white background; we pre-process it once on load
    //  to invert luminance into alpha (white → transparent, black → opaque).
    //  Requires leftWindowShadowPin / rightWindowShadowPin in ANCHORS.
    // ══════════════════════════════════════════════════════════════════════════
    const windowShadow = (() => {
      let _img = null;

      const _loader = new Image();
      _loader.onload = () => { _img = _loader; };
      _loader.src = 'window-shadow.png';

      const active = [];

      function trigger() {
        const hasLeft  = ANCHORS.leftWindowShadowPin  !== null;
        const hasRight = ANCHORS.rightWindowShadowPin !== null;
        if (!hasLeft && !hasRight) return;
        const which = (!hasLeft) ? 1 : (!hasRight) ? 0 : (Math.random() < 0.5 ? 0 : 1);
        active.push({ which, t0: performance.now() });
      }

      function draw(ctx, now) {
        if (!_img || !imgNaturalW || active.length === 0) return;

        for (let i = active.length - 1; i >= 0; i--) {
          const a    = active[i];
          const et   = (now - a.t0) / 1000;
          if (et >= 5.0) { active.splice(i, 1); continue; }

          const fade = Math.sin((et / 5.0) * Math.PI);
          if (fade < 0.005) continue;

          const pinKey = a.which === 0 ? 'leftWindowShadowPin' : 'rightWindowShadowPin';
          if (!ANCHORS[pinKey]) continue;
          const pin = paintToCanvas(...ANCHORS[pinKey]);

          // Derive actual window half-height from pin (bottom sill) and window center.
          // wh=50*s was a guess; pin.y - center.y gives the real measured value.
          const winKey = a.which === 0 ? 'leftWindow' : 'rightWindow';
          const center  = paintToCanvas(...ANCHORS[winKey]);
          const halfH   = pin.y - center.y;   // measured half-height in screen px

          const imgAspect = _img.naturalWidth / _img.naturalHeight;
          const dh = halfH * 1.8;             // slightly shorter than full pane height
          const dw = dh * imgAspect;

          // X: centered on window center (more accurate than pin X)
          // Y: bottom on pin (sill)
          const dx = center.x - dw * 0.5;
          const dy = pin.y - dh;

          ctx.save();
          ctx.globalAlpha = fade * 0.70;
          ctx.drawImage(_img, dx, dy, dw, dh);
          ctx.restore();
        }
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Owl — swoops from off-screen left, perches on left tree, departs right.
    //  Uses swoop.png (pre-alpha) for the departing phase; falls back to
    //  procedural drawing if the image hasn't loaded.
    //  Requires owlPerch in ANCHORS (measure via ?debug).
    // ══════════════════════════════════════════════════════════════════════════
    const owl = (() => {
      let _swoopImg = null;
      const _imgLoad = new Image();
      _imgLoad.onload = () => { _swoopImg = _imgLoad; };
      _imgLoad.src = 'owl-swoop.png';

      let _flyingImg = null;
      const _flyingLoad = new Image();
      _flyingLoad.onload = () => { _flyingImg = _flyingLoad; };
      _flyingLoad.src = 'owl-flying.png';

      const active = [];

      function trigger() {
        if (!ANCHORS.owlPerch || active.length > 0) return;
        active.push({ t0: performance.now() });
      }

      function draw(ctx, now) {
        if (!active.length || !ANCHORS.owlPerch || !imgNaturalW) return;

        const a  = active[0];
        const et = (now - a.t0) / 1000;
        if (et >= 16.1) { active.shift(); return; }

        const perch = paintToCanvas(...ANCHORS.owlPerch);
        const W = window.innerWidth, H = window.innerHeight;
        const sz    = Math.min(W, H) * 0.070;
        const rsz   = sz / 3;
        const p     = et / 16.1;
        const fadeIn = Math.min(1, et / 0.55);

        function drawFlying(x, y, phase, lift, alpha, mode) {
          const sz = rsz;
          const wb = Math.sin(phase * TAU);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(x, y);
          ctx.rotate(lift);

          if (mode === 'departing') {
            const lp = Math.sin(phase * TAU * .36) * .04;
            ctx.scale(-1, 1);
            ctx.fillStyle = '#100904';
            ctx.save(); ctx.rotate(-.48 + lp);
            ctx.beginPath();
            ctx.moveTo(-sz*.06,-sz*.02);
            ctx.quadraticCurveTo(-sz*.86,-sz*.76,-sz*1.86,-sz*.58);
            ctx.quadraticCurveTo(-sz*1.62,-sz*.42,-sz*1.92,-sz*.28);
            ctx.quadraticCurveTo(-sz*1.52,-sz*.20,-sz*1.86,-sz*.04);
            ctx.quadraticCurveTo(-sz*1.42, sz*.02,-sz*1.70, sz*.18);
            ctx.quadraticCurveTo(-sz*.92,  sz*.22,-sz*.08,  sz*.16);
            ctx.closePath(); ctx.fill();
            ctx.restore();
            ctx.fillStyle = '#120a04';
            ctx.save(); ctx.rotate(-.20 - lp * .55);
            ctx.beginPath();
            ctx.moveTo(0,-sz*.04);
            ctx.quadraticCurveTo( sz*.82,-sz*.86, sz*1.94,-sz*.76);
            ctx.quadraticCurveTo( sz*1.70,-sz*.56, sz*2.02,-sz*.44);
            ctx.quadraticCurveTo( sz*1.62,-sz*.34, sz*1.92,-sz*.17);
            ctx.quadraticCurveTo( sz*1.46,-sz*.08, sz*1.70, sz*.08);
            ctx.quadraticCurveTo( sz*.88,  sz*.18, sz*.02,  sz*.14);
            ctx.closePath(); ctx.fill();
            ctx.restore();
            ctx.fillStyle = '#0d0703';
            ctx.beginPath();
            ctx.moveTo(sz*.34,sz*.12); ctx.lineTo(sz*.98,sz*.04); ctx.lineTo(sz*.80,sz*.20);
            ctx.lineTo(sz*1.04,sz*.34); ctx.lineTo(sz*.34,sz*.34); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#130a04';
            ctx.beginPath(); ctx.ellipse(0, sz*.20, sz*.58, sz*.34, .06, 0, TAU); ctx.fill();
            ctx.fillStyle = '#0f0803';
            ctx.beginPath(); ctx.arc(-sz*.38, -sz*.10, sz*.36, 0, TAU); ctx.fill();
            ctx.fillStyle = '#140b04';
            ctx.beginPath();
            ctx.moveTo(-sz*.58,-sz*.18);
            ctx.quadraticCurveTo(-sz*.34,-sz*.48,-sz*.10,-sz*.18);
            ctx.quadraticCurveTo(-sz*.02, sz*.10,-sz*.34, sz*.18);
            ctx.quadraticCurveTo(-sz*.66, sz*.10,-sz*.58,-sz*.18);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#0b0502';
            ctx.beginPath();
            ctx.moveTo(-sz*.35,-sz*.02); ctx.lineTo(-sz*.26,sz*.10); ctx.lineTo(-sz*.44,sz*.10);
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = '#0b0502'; ctx.lineWidth = sz*.045; ctx.lineCap = 'round';
            [-sz*.16, sz*.03].forEach((lx, i) => {
              ctx.beginPath(); ctx.moveTo(lx, sz*.42); ctx.lineTo(lx + sz*(.06+i*.03), sz*.61); ctx.stroke();
            });
            ctx.restore(); return;
          }

          // swooping mode
          const wr = .18 + Math.max(0, -wb) * .12;
          ctx.fillStyle = '#100904';
          ctx.save(); ctx.rotate(-wr * .62);
          ctx.beginPath();
          ctx.moveTo(-sz*.12,-sz*.02);
          ctx.quadraticCurveTo(-sz*.42,-sz*.92,-sz*.94,-sz*1.38);
          ctx.quadraticCurveTo(-sz*1.14,-sz*1.08,-sz*1.00,-sz*.76);
          ctx.quadraticCurveTo(-sz*1.20,-sz*.64,-sz*1.02,-sz*.40);
          ctx.quadraticCurveTo(-sz*1.18,-sz*.24,-sz*.92,-sz*.08);
          ctx.quadraticCurveTo(-sz*.58,  sz*.08,-sz*.12, sz*.14);
          ctx.closePath(); ctx.fill();
          ctx.restore();
          ctx.save(); ctx.rotate(wr * .62);
          ctx.beginPath();
          ctx.moveTo( sz*.12,-sz*.02);
          ctx.quadraticCurveTo( sz*.42,-sz*.92, sz*.94,-sz*1.38);
          ctx.quadraticCurveTo( sz*1.14,-sz*1.08, sz*1.00,-sz*.76);
          ctx.quadraticCurveTo( sz*1.20,-sz*.64, sz*1.02,-sz*.40);
          ctx.quadraticCurveTo( sz*1.18,-sz*.24, sz*.92,-sz*.08);
          ctx.quadraticCurveTo( sz*.58,  sz*.08, sz*.12, sz*.14);
          ctx.closePath(); ctx.fill();
          ctx.restore();
          ctx.beginPath(); ctx.ellipse(0, sz*.22, sz*.42, sz*.58, 0, 0, TAU); ctx.fill();
          ctx.fillStyle = '#0b0502';
          ctx.beginPath();
          ctx.moveTo(-sz*.25,sz*.68); ctx.lineTo(0,sz*1.04); ctx.lineTo(sz*.25,sz*.68);
          ctx.lineTo(sz*.14,sz*1.14); ctx.lineTo(0,sz*.98); ctx.lineTo(-sz*.14,sz*1.14);
          ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.arc(0, -sz*.28, sz*.32, 0, TAU); ctx.fill();
          [[-sz*.18,-1],[sz*.18,1]].forEach(([ox, side]) => {
            ctx.beginPath();
            ctx.moveTo(ox,-sz*.50); ctx.lineTo(ox+side*sz*.12,-sz*.76); ctx.lineTo(ox-side*sz*.05,-sz*.55);
            ctx.closePath(); ctx.fill();
          });
          ctx.restore();
        }

        function drawPerched(x, y, alpha) {
          const sz = rsz;
          const ht = Math.sin(et * 1.28) * 0.36;
          ctx.save(); ctx.globalAlpha = alpha; ctx.translate(x, y);
          ctx.fillStyle = '#160d06';
          ctx.beginPath(); ctx.ellipse(0, sz*.24, sz*.34, sz*.54, 0, 0, TAU); ctx.fill();
          ctx.fillStyle = '#211307';
          ctx.beginPath(); ctx.ellipse(-sz*.20, sz*.20, sz*.14, sz*.44, -.16, 0, TAU); ctx.fill();
          ctx.beginPath(); ctx.ellipse( sz*.20, sz*.20, sz*.14, sz*.44,  .16, 0, TAU); ctx.fill();
          ctx.save(); ctx.translate(0, -sz*.18); ctx.rotate(ht);
          ctx.fillStyle = '#1a0f07';
          ctx.beginPath(); ctx.arc(0, 0, sz*.34, 0, TAU); ctx.fill();
          [[-sz*.16,-1],[sz*.16,1]].forEach(([ox, s]) => {
            ctx.beginPath();
            ctx.moveTo(ox,-sz*.25); ctx.lineTo(ox+s*sz*.12,-sz*.50); ctx.lineTo(ox-s*sz*.05,-sz*.31);
            ctx.closePath(); ctx.fill();
          });
          ctx.fillStyle = 'rgba(255,222,128,0.96)';
          [-sz*.12, sz*.12].forEach(ex => { ctx.beginPath(); ctx.arc(ex,-sz*.02,sz*.085,0,TAU); ctx.fill(); });
          ctx.fillStyle = '#090504';
          [-sz*.12, sz*.12].forEach(ex => { ctx.beginPath(); ctx.arc(ex,-sz*.02,sz*.044,0,TAU); ctx.fill(); });
          ctx.restore();
          ctx.strokeStyle = '#100904'; ctx.lineWidth = sz*.055; ctx.lineCap = 'round';
          [-sz*.10, sz*.10].forEach(fx => {
            ctx.beginPath(); ctx.moveTo(fx, sz*.75); ctx.lineTo(fx + sz*.13, sz*.84); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(fx, sz*.75); ctx.lineTo(fx - sz*.13, sz*.84); ctx.stroke();
          });
          ctx.restore();
        }

        if (p < 0.244) {
          const q    = p / 0.244;
          const ease = 1 - Math.pow(1 - q, 3);
          const startX = perch.x - Math.min(W, H) * 0.52;
          const startY = perch.y - H * 0.28;
          const owlX = startX + (perch.x - startX) * ease;
          const owlY = startY + (perch.y - startY) * ease + Math.sin(q * Math.PI) * sz * 0.86;
          if (_flyingImg) {
            const drawSize = sz * 1.2;
            ctx.save();
            ctx.globalAlpha = fadeIn;
            ctx.translate(owlX, owlY);
            ctx.rotate(0.34 - ease * 0.42);
            ctx.drawImage(_flyingImg, -drawSize * 0.5, -drawSize * 0.5, drawSize, drawSize);
            ctx.restore();
          } else {
            drawFlying(owlX, owlY, et * 1.7, 0.34 - ease * 0.42, fadeIn, 'swooping');
          }
        } else if (p < 0.609) {
          drawPerched(perch.x, perch.y, Math.min(1, (p - 0.244) / 0.07));
        } else {
          const q    = (p - 0.609) / 0.391;
          const ease = q * q * (3 - 2 * q);
          const endY = paintToCanvas(...ANCHORS.leftRoofEdge).y - sz * 0.85;
          const owlX = perch.x + (W - perch.x + sz * 2) * ease;
          const owlY = perch.y * (1 - ease) + endY * ease - Math.sin(q * Math.PI) * sz * 2.0;
          const edgeFade = owlX > W * 0.88 ? Math.max(0, 1 - (owlX - W * 0.88) / (sz * 3)) : 1;
          if (_swoopImg) {
            const drawH = rsz * 2.3;
            const drawW = drawH * (_swoopImg.naturalWidth / _swoopImg.naturalHeight);
            ctx.save();
            ctx.globalAlpha = edgeFade;
            ctx.translate(owlX, owlY);
            ctx.rotate(-0.10 - ease * 0.10);
            ctx.drawImage(_swoopImg, -drawW * 0.5, -drawH * 0.5, drawW, drawH);
            ctx.restore();
          } else {
            drawFlying(owlX, owlY, et * 2.15, -0.10 - ease * 0.10, edgeFade, 'departing');
          }
        }
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Rabbit — hops in from one side, pauses, hops out the other side.
    //  Requires rabbitGround in ANCHORS (measure via ?debug).
    // ══════════════════════════════════════════════════════════════════════════
    const rabbit = (() => {
      let _hopImg   = null;
      let _stillImg = null;

      const _hL = new Image();
      _hL.onload = () => { _hopImg = _hL; };
      _hL.src = 'rabbit-hop.png';

      const _sL = new Image();
      _sL.onload = () => { _stillImg = _sL; };
      _sL.src = 'rabbit-still.png';

      const active = [];

      const IN_END      = 6.4;   // min hop-in seconds before pause check
      const STILL_DUR   = 4.6;   // pause duration
      const HOP_OUT_DUR = 7.4;   // hop-out travel time
      const DUR         = 22.0;  // safety cap
      const HOP_FREQ    = 2.0;   // hops per second — lower = bigger, more visible hops
      const AIR_FRAC    = 0.50;  // 50% of hop cycle airborne, 50% grounded

      function trigger() {
        if (!ANCHORS.rabbitGround || active.length > 0) return;
        active.push({ t0: performance.now(), dir: Math.random() < 0.5 ? 1 : -1, stillStart: null });
      }

      function draw(ctx, now) {
        if (!active.length || !ANCHORS.rabbitGround || !imgNaturalW) return;

        const a  = active[0];
        const et = (now - a.t0) / 1000;

        const endTime = a.stillStart !== null ? a.stillStart + STILL_DUR + HOP_OUT_DUR : DUR;
        if (et >= endTime) { active.shift(); return; }

        const ground   = paintToCanvas(...ANCHORS.rabbitGround);
        const approach = ANCHORS.rabbitBoulderApproach ? paintToCanvas(...ANCHORS.rabbitBoulderApproach) : null;
        const btm      = ANCHORS.rabbitBoulderBottom   ? paintToCanvas(...ANCHORS.rabbitBoulderBottom)   : null;
        const { s }    = coverScale();
        const rabH     = 29 * s;

        const W   = window.innerWidth;
        const pad = W * 0.13;

        const startX = a.dir > 0 ? -pad : W + pad;
        const exitX  = a.dir > 0 ? W + pad : -pad;
        const flip   = a.dir > 0;

        // Direction-aware Y track.
        // dir=1 (L→R): slope ground→approach, sin-arc dip down to boulder bottom and back.
        // dir=-1 (R→L): enter at boulder-bottom level, half-sine rise through arc, slope to ground.
        function groundY(sx) {
          if (!approach || !btm) return ground.y;
          const ax = approach.x, ay = approach.y;
          const bx = btm.x,      by = btm.y;
          const gx = ground.x,   gy = ground.y;
          const arcEnd = bx + (bx - ax);
          const dip    = by - ay;

          if (a.dir > 0) {
            if (sx <= ax) {
              const t = (sx - gx) / (ax - gx);
              return gy + (ay - gy) * Math.max(0, Math.min(1, t));
            }
            if (sx <= arcEnd) {
              const t = (sx - ax) / (arcEnd - ax);
              return ay + Math.sin(t * Math.PI) * dip;
            }
            return ay;
          } else {
            if (sx > arcEnd) return by;
            if (sx >= ax) {
              const t = (sx - ax) / (arcEnd - ax);
              return ay + Math.sin(t * Math.PI / 2) * dip;
            }
            const t = (sx - gx) / (ax - gx);
            return gy + (ay - gy) * Math.max(0, Math.min(1, t));
          }
        }

        let x, y, img;

        if (a.stillStart === null) {
          // Hop-in: x advances only while airborne; stationary while grounded.
          // Each hop covers (total distance / total hops) — no sliding on landing.
          const hopNum  = Math.floor(et * HOP_FREQ);
          const hp      = (et * HOP_FREQ) % 1.0;
          const totHops = IN_END * HOP_FREQ;
          const f0      = Math.min(1, hopNum / totHops);
          const f1      = Math.min(1, (hopNum + 1) / totHops);
          const xFrac   = hp < AIR_FRAC ? f0 + (f1 - f0) * (hp / AIR_FRAC) : f1;
          x = startX + (ground.x - startX) * xFrac;
          const bounce  = hp < AIR_FRAC ? Math.sin((hp / AIR_FRAC) * Math.PI) * rabH * 0.8 : 0;
          img = bounce > 0 ? _hopImg : _stillImg;
          y = groundY(x) - bounce;
          if (et >= IN_END && bounce === 0) a.stillStart = et;
        } else {
          const ss = et - a.stillStart;
          if (ss < STILL_DUR) {
            img = _stillImg;
            x   = ground.x;
            y   = ground.y;
          } else {
            const tOut    = ss - STILL_DUR;
            const hopNum  = Math.floor(tOut * HOP_FREQ);
            const hp      = (tOut * HOP_FREQ) % 1.0;
            const totHops = HOP_OUT_DUR * HOP_FREQ;
            const f0      = Math.min(1, hopNum / totHops);
            const f1      = Math.min(1, (hopNum + 1) / totHops);
            const xFrac   = hp < AIR_FRAC ? f0 + (f1 - f0) * (hp / AIR_FRAC) : f1;
            x = ground.x + (exitX - ground.x) * xFrac;
            const bounce  = hp < AIR_FRAC ? Math.sin((hp / AIR_FRAC) * Math.PI) * rabH * 0.8 : 0;
            img = bounce > 0 ? _hopImg : _stillImg;
            y = groundY(x) - bounce;
          }
        }

        const alpha = Math.min(Math.min(1, et / 0.4), Math.max(0, (endTime - et) / 0.8));
        if (!img) return;
        const rabW = rabH * (img.naturalWidth / img.naturalHeight);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x, y);
        if (flip) ctx.scale(-1, 1);
        ctx.drawImage(img, -rabW * 0.5, -rabH, rabW, rabH);
        ctx.restore();
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Deer — walks across the foreground snow, pauses mid-scene, walks out.
    //  dir=1 (L→R): enters at baseGy, dips down around boulder, exits at btm.y.
    //  dir=-1 (R→L): enters at btm.y, rises after passing boulder, exits at baseGy.
    //  Arc-length normalization keeps perceived screen speed constant through
    //  the terrain change so the deer doesn't appear to rush past the boulder.
    //  Requires deerGround in ANCHORS (falls back to groundLevel).
    // ══════════════════════════════════════════════════════════════════════════
    const DEER_WALK_FRAMES = 11;
    const deer = (() => {
      const _sprites = {};
      const _names   = [...Array.from({ length: DEER_WALK_FRAMES }, (_, i) => `walk-${i}`), 'pause'];
      for (const n of _names) {
        const img = new Image();
        img.onload = () => { _sprites[n] = img; };
        img.src = `deer/${n}.png`;
      }

      const active = [];

      // Terrain Y for a given screen-x.
      // dir=1 : slope baseGy→ay, half-sine dip ay→by, flat at by.
      // dir=-1: flat at by, half-sine rise by→ay, slope ay→baseGy.
      function terrainY(sx, dir, baseGy, startX, endX) {
        const apA = ANCHORS.rabbitBoulderApproach, btA = ANCHORS.rabbitBoulderBottom;
        if (!apA || !btA) return baseGy;
        const ap = paintToCanvas(...apA), bt = paintToCanvas(...btA);
        const ax = ap.x, ay = ap.y, bx = bt.x, by = bt.y;
        const dip = by - ay, arcEnd = bx + (bx - ax);

        if (dir > 0) {
          if (sx <= ax) {
            const span = ax - startX;
            return baseGy + (ay - baseGy) * (span > 0 ? Math.max(0, Math.min(1, (sx - startX) / span)) : 1);
          }
          if (sx <= bx) return ay + Math.sin((sx - ax) / (bx - ax) * Math.PI * 0.5) * dip;
          return by;
        } else {
          // Flat at by until the deer passes the boulder's left edge (ax), then rise.
          if (sx >= ax) return by;
          const arcWidth = bx - ax;
          const arcLeft  = ax - arcWidth;
          if (sx >= arcLeft) {
            const t = (ax - sx) / arcWidth;  // 0 at ax, 1 at arcLeft
            return by - Math.sin(t * Math.PI * 0.5) * dip;
          }
          const span = endX - arcLeft;
          return ay + (baseGy - ay) * (span !== 0 ? Math.max(0, Math.min(1, (sx - arcLeft) / span)) : 1);
        }
      }

      // Build arc-length lookup: table[i] = cumulative arc fraction at xp = i/N.
      const LOOKUP_N = 24;
      function buildLookup(dir, baseGy, startX, endX) {
        const lens = [0];
        for (let i = 1; i <= LOOKUP_N; i++) {
          const xp0 = (i - 1) / LOOKUP_N, xp1 = i / LOOKUP_N;
          const sx0 = startX + (endX - startX) * xp0;
          const sx1 = startX + (endX - startX) * xp1;
          lens.push(lens[i - 1] + Math.hypot(
            sx1 - sx0,
            terrainY(sx1, dir, baseGy, startX, endX) - terrainY(sx0, dir, baseGy, startX, endX)
          ));
        }
        const total = lens[LOOKUP_N];
        return lens.map(l => l / total);
      }

      // Invert the lookup: arc fraction → xp position.
      function arcFracToXP(frac, table) {
        if (frac <= 0) return 0;
        if (frac >= 1) return 1;
        let lo = 0, hi = LOOKUP_N;
        while (lo < hi - 1) {
          const mid = (lo + hi) >> 1;
          if (table[mid] <= frac) lo = mid; else hi = mid;
        }
        return (lo + (frac - table[lo]) / (table[hi] - table[lo])) / LOOKUP_N;
      }

      function trigger() {
        const anchor = ANCHORS.deerGround || ANCHORS.groundLevel;
        if (!anchor || active.length > 0) return;
        active.push({ t0: performance.now(), dir: Math.random() < 0.5 ? 1 : -1, lookup: null });
      }

      function draw(ctx, now) {
        if (!active.length || !imgNaturalW) return;
        const anchor = ANCHORS.deerGround || ANCHORS.groundLevel;
        if (!anchor) return;

        const a  = active[0];
        const et = (now - a.t0) / 1000;
        const dur = 20;
        if (et >= dur) { active.shift(); return; }

        const W = window.innerWidth, H = window.innerHeight;
        const ground  = paintToCanvas(...anchor);
        const sz      = Math.min(W, H) * 0.0644;
        const baseGy  = ground.y + Math.min(W, H) * 0.037;
        const margin  = sz * 1.5;
        const startX  = a.dir > 0 ? -margin : W + margin;
        const endX    = a.dir > 0 ? W + margin : -margin;

        // Compute arc-length lookup on first draw of this event
        if (!a.lookup) a.lookup = buildLookup(a.dir, baseGy, startX, endX);
        const table   = a.lookup;
        const midFrac = table[LOOKUP_N >> 1];  // arc fraction at spatial midpoint (xp=0.5)

        const p  = et / dur;
        const ps = 0.40, pe = 0.58;
        const pausing = p >= ps && p < pe;

        // Arc-length-normalized xp: deer moves at constant screen speed through terrain changes
        let xp;
        if (p < ps) {
          xp = arcFracToXP(p / ps * midFrac, table);
        } else if (pausing) {
          xp = 0.5;
        } else {
          xp = arcFracToXP(midFrac + (p - pe) / (1 - pe) * (1 - midFrac), table);
        }

        const dx = startX + (endX - startX) * xp;
        const gy = terrainY(dx, a.dir, baseGy, startX, endX);
        const fa = p < 0.07 ? p / 0.07 : p > 0.93 ? (1 - p) / 0.07 : 1;

        const walkTime = pausing ? ps * dur : et;
        const frameIdx = Math.floor(walkTime * (4.6 / TAU) * DEER_WALK_FRAMES) % DEER_WALK_FRAMES;
        const frame    = pausing ? (_sprites['pause'] || _sprites['walk-0'])
                                 : _sprites[`walk-${frameIdx}`];
        if (!frame) return;

        const drawH  = sz * 1.2;
        const drawW  = drawH * (frame.naturalWidth / frame.naturalHeight);
        const FOOT_X = 0.50, FOOT_Y = 0.92;
        const wc     = pausing ? 0 : et * 4.6;
        const bob    = pausing ? 0 : Math.abs(Math.cos(wc)) * sz * 0.028;

        ctx.save();
        ctx.globalAlpha = fa;
        ctx.translate(dx, gy);
        if (a.dir < 0) ctx.scale(-1, 1);
        ctx.translate(0, -bob);
        ctx.drawImage(frame, -drawW * FOOT_X, -drawH * FOOT_Y, drawW, drawH);

        if (pausing) {
          const bAge  = et - ps * dur;
          const bFade = Math.min(1, bAge / 0.55);
          const noseX = drawW * 0.38;
          const noseY = -drawH * 0.55;
          const breathAngle = -0.35;
          for (let i = 0; i < 3; i++) {
            const bp = ((now * 0.00062 + i * 0.42) % 1.5) * bFade;
            ctx.globalAlpha = fa * (1 - bp / 1.5) * 0.28 * bFade;
            ctx.fillStyle = '#cce4f3';
            ctx.beginPath();
            ctx.arc(
              noseX + Math.cos(breathAngle) * bp * sz * 0.25,
              noseY + Math.sin(breathAngle) * bp * sz * 0.25,
              sz * 0.025 + bp * sz * 0.050, 0, TAU
            );
            ctx.fill();
          }
        }

        ctx.restore();
      }

      return { trigger, draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Effects layer — draw order: stars → owl → shadow → glow → smoke
    //  Shadow is drawn BEFORE the window glow so the amber light overlays it,
    //  making the figure look like it's inside the cabin behind the glass.
    //  Owl is drawn before the window effects — it's an outdoor creature.
    // ══════════════════════════════════════════════════════════════════════════
    function drawEffects(dt, t) {
      fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
      stars.draw(fxCtx, t);
      shootingStar.draw(fxCtx, performance.now());
      owl.draw(fxCtx, performance.now());
      rabbit.draw(fxCtx, performance.now());
      deer.draw(fxCtx, performance.now());
      windowShadow.draw(fxCtx, performance.now());
      windowGlow.draw(fxCtx, t);
      smoke.update(dt, t);
      smoke.draw(fxCtx);
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  Main loop
    // ══════════════════════════════════════════════════════════════════════════
    let t    = 0;
    let last = performance.now();

    function frame(now) {
      const dt   = Math.min(now - last, 50);
      last = now;
      t   += dt;

      const step = dt / 16.667;

      // Event timer: blizzard surge
      if (blizzardTimer > 0) {
        blizzardTimer -= dt;
        if (blizzardTimer <= 0) {
          blizzardTimer = 0;
          weatherPaused = false;
          targetSnow    = 0.7;
          targetWindStr = 0;
          targetWindX   = 0;
        }
      }

      // Event timer: cabin flicker — random rapid on/off each frame
      if (flickerTimer > 0) {
        flickerTimer -= dt;
        flickerMul = Math.random() < 0.22 ? 0.04 + Math.random() * 0.08
                                           : 0.70 + Math.random() * 0.30;
        if (flickerTimer <= 0) {
          flickerTimer = 0;
          flickerMul   = 1;
        }
      }

      const snowLerp = 0.008 * step;
      const windLerp = 0.005 * step;
      curSnow    += (targetSnow    - curSnow)    * snowLerp;
      curWindX   += (targetWindX   - curWindX)   * windLerp;
      curWindStr += (targetWindStr - curWindStr)  * windLerp;

      const w = ambientWind(t) + curWindX * curWindStr * 4.0;

      const cw = farCanvas.width;
      const ch = farCanvas.height;

      // Far flakes
      farCtx.clearRect(0, 0, cw, ch);
      for (const f of farFlakes) {
        const sway       = Math.sin(t * 0.001 * f.freq + f.phase) * f.amp;
        const speedScale = 0.6 + 0.4 * curSnow;
        f.x += (w + sway * 0.06) * step;
        f.y += f.vy * speedScale * step;

        if (f.y >  ch + 4) { f.y = -4;      f.x = Math.random() * cw; }
        if (f.x >  cw + 4) { f.x = -4; }
        if (f.x < -4)      { f.x =  cw + 4; }

        if (f.sparkle <= 0 && Math.random() < 0.0003 * curSnow * step) f.sparkle = 1.0;

        const drawOpacity = f.opacity * curSnow;
        farCtx.beginPath();
        farCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        farCtx.fillStyle = `rgba(215, 232, 255, ${drawOpacity})`;
        farCtx.fill();

        if (f.sparkle > 0) {
          const sz  = f.r * 4 * f.sparkle;
          const sOp = f.sparkle * 0.7 * curSnow;
          farCtx.strokeStyle = `rgba(230, 245, 255, ${sOp})`;
          farCtx.lineWidth   = 0.7;
          farCtx.beginPath();
          farCtx.moveTo(f.x - sz, f.y); farCtx.lineTo(f.x + sz, f.y);
          farCtx.moveTo(f.x, f.y - sz); farCtx.lineTo(f.x, f.y + sz);
          farCtx.stroke();
          f.sparkle -= step * 0.04;
        }
      }

      // Near (bokeh) flakes
      nearCtx.clearRect(0, 0, cw, ch);
      for (const f of nearFlakes) {
        const sway       = Math.sin(t * 0.001 * f.freq + f.phase) * f.amp;
        const speedScale = 0.6 + 0.4 * curSnow;
        f.x += (w * 1.15 + sway * 0.07) * step;
        f.y += f.vy * speedScale * step;

        if (f.y >  ch + 20) { f.y = -20;     f.x = Math.random() * cw; }
        if (f.x >  cw + 20) { f.x = -20; }
        if (f.x < -20)      { f.x =  cw + 20; }

        const drawOpacity = f.opacity * curSnow;
        const g = nearCtx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
        g.addColorStop(0,    `rgba(255, 255, 255, ${drawOpacity})`);
        g.addColorStop(0.45, `rgba(200, 225, 255, ${drawOpacity * 0.55})`);
        g.addColorStop(1,    'rgba(180, 210, 255, 0)');

        nearCtx.beginPath();
        nearCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        nearCtx.fillStyle = g;
        nearCtx.fill();
      }

      drawEffects(dt, t);

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);

    // ══════════════════════════════════════════════════════════════════════════
    //  Debug mode  —  append ?debug to URL to activate
    //  Click anywhere to capture paint-pixel coordinates.
    //  Coordinates are logged to console and displayed on-screen.
    //  Use these values to populate the ANCHORS table above.
    // ══════════════════════════════════════════════════════════════════════════
    const debugMode = new URLSearchParams(location.search).has('debug');

    const dbgPanel   = document.getElementById('dbg-panel');
    const dbgOverlay = document.getElementById('dbg-overlay');

    const debugPins = [];  // { sx, sy, px, py, label }

    function updateDebugPanel(msg) {
      dbgPanel.textContent = msg;
    }

    function redrawDebugPins() {
      if (!debugMode) return;
      dbgCtx.clearRect(0, 0, dbgCanvas.width, dbgCanvas.height);
      dbgCtx.font        = '11px monospace';
      dbgCtx.lineWidth   = 1;

      for (const pin of debugPins) {
        const { x, y } = paintToCanvas(pin.px, pin.py);

        // Crosshair
        dbgCtx.strokeStyle = 'rgba(255, 0, 220, 0.85)';
        dbgCtx.beginPath();
        dbgCtx.moveTo(x - 10, y); dbgCtx.lineTo(x + 10, y);
        dbgCtx.moveTo(x, y - 10); dbgCtx.lineTo(x, y + 10);
        dbgCtx.stroke();

        // Dot
        dbgCtx.fillStyle = 'rgba(255, 0, 220, 0.9)';
        dbgCtx.beginPath();
        dbgCtx.arc(x, y, 3, 0, Math.PI * 2);
        dbgCtx.fill();

        // Label
        const label = pin.label || `(${pin.px}, ${pin.py})`;
        dbgCtx.fillStyle = 'rgba(0,0,0,0.6)';
        dbgCtx.fillRect(x + 6, y - 14, label.length * 6.5 + 6, 16);
        dbgCtx.fillStyle = '#0f0';
        dbgCtx.fillText(label, x + 9, y - 2);
      }
    }

    if (debugMode) {
      dbgPanel.style.display   = 'block';
      dbgOverlay.style.display = 'block';

      updateDebugPanel(imgNaturalW
        ? `Image: ${imgNaturalW}×${imgNaturalH}\nClick to capture paint coords.`
        : 'Loading image dimensions…');

      let pinCount = 0;

      dbgOverlay.addEventListener('click', e => {
        if (!imgNaturalW) {
          updateDebugPanel('Image not loaded yet — wait a moment and try again.');
          return;
        }

        const { px, py } = canvasToPaint(e.clientX, e.clientY);
        pinCount++;
        const label = `${pinCount}: (${px}, ${py})`;

        debugPins.push({ px, py, label });
        console.log(`[debug] pin ${pinCount}: paintToCanvas coord = [${px}, ${py}]`);

        updateDebugPanel(
          `Image: ${imgNaturalW}×${imgNaturalH}  Screen: ${window.innerWidth}×${window.innerHeight}\n` +
          `Last click: [${px}, ${py}]  (pin ${pinCount})\n\n` +
          debugPins.map(p => `  ${p.label}`).join('\n')
        );

        redrawDebugPins();
      });

      // Right-click clears all pins
      dbgOverlay.addEventListener('contextmenu', e => {
        e.preventDefault();
        debugPins.length = 0;
        pinCount = 0;
        dbgCtx.clearRect(0, 0, dbgCanvas.width, dbgCanvas.height);
        updateDebugPanel(`Image: ${imgNaturalW}×${imgNaturalH}\nPins cleared. Click to capture.`);
      });
    }
  </script>
</body>
</html>
