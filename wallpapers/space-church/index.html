<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; }
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('space_church_background.png') center / cover no-repeat;
    }
    #night-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: #000; opacity: 0; pointer-events: none;
    }
    #effects, #dbg-canvas {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
    }
    #dbg-canvas { z-index: 3; }
    #dbg-overlay {
      position: fixed; inset: 0; cursor: crosshair; z-index: 9000; display: none;
    }
    #dbg-panel {
      position: fixed; top: 8px; left: 8px; z-index: 9999; display: none;
      background: rgba(0,0,0,0.72); color: #8af; font: 12px/1.6 monospace;
      padding: 8px 10px; border-radius: 4px; pointer-events: none;
      max-width: 420px; white-space: pre;
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="night-overlay"></div>
  <canvas id="effects"></canvas>
  <canvas id="dbg-canvas"></canvas>
  <div id="dbg-overlay"></div>
  <div id="dbg-panel"></div>

  <script>
    // ══════════════════════════════════════════════════════════════════════════
    //  Image-anchor system
    // ══════════════════════════════════════════════════════════════════════════
    let imgNaturalW = 0, imgNaturalH = 0;
    const _probe = new Image();
    _probe.onload = () => {
      imgNaturalW = _probe.naturalWidth;
      imgNaturalH = _probe.naturalHeight;
      if (debugMode) updateDebugPanel(`Image: ${imgNaturalW}×${imgNaturalH}\nClick to capture paint coords.`);
    };
    _probe.src = 'space_church_background.png';

    function coverScale() {
      const W = window.innerWidth, H = window.innerHeight;
      const s = Math.max(W / imgNaturalW, H / imgNaturalH);
      return { s, ox: (W - imgNaturalW * s) / 2, oy: (H - imgNaturalH * s) / 2 };
    }
    function paintToCanvas(px, py) {
      if (!imgNaturalW) return { x: px, y: py };
      const { s, ox, oy } = coverScale();
      return { x: px * s + ox, y: py * s + oy };
    }
    function canvasToPaint(sx, sy) {
      if (!imgNaturalW) return { px: 0, py: 0 };
      const { s, ox, oy } = coverScale();
      return { px: Math.round((sx - ox) / s), py: Math.round((sy - oy) / s) };
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  ANCHORS — keyed by pillarN prefix; add pillar2…6 as they are built
    // ══════════════════════════════════════════════════════════════════════════
    const ANCHORS = {
      pillar1TopLeft:  [557, 625],   // leftmost corner of pillar 1 top surface
      pillar1TopRight: [617, 623],   // rightmost corner of pillar 1 top surface
      pillar1ImageTop: [592, 512],   // top-center of pillar 1 display area
      pillar1Lowest:   [607, 626],   // lowest point of pillar 1 top surface (pin 7)

      pillar2TopLeft:  [131, 681],   // pin 1 — leftmost corner of pillar 2 top surface
      pillar2TopRight: [284, 674],   // pin 3 — rightmost corner of pillar 2 top surface
      pillar2ImageTop: [225, 414],   // pin 5 — top-center of pillar 2 display area
      pillar2Lowest:   [223, 684],   // pin 2 — lowest point of pillar 2 top surface

      pillar3TopLeft:  [1052, 623],  // pin 1 — leftmost corner of pillar 3 top surface
      pillar3TopRight: [1121, 626],  // pin 3 — rightmost corner of pillar 3 top surface
      pillar3ImageTop: [1082, 512],  // pin 5 — top-center of pillar 3 display area
      pillar3Lowest:   [1061, 627],  // pin 2 — lowest point of pillar 3 top surface

      pillar4TopLeft:  [1192, 640],  // pin 1 — leftmost corner of pillar 4 top surface
      pillar4TopRight: [1281, 645],  // pin 3 — rightmost corner of pillar 4 top surface
      pillar4ImageTop: [1242, 491],  // pin 5 — top-center of pillar 4 display area
      pillar4Lowest:   [1215, 646],  // pin 2 — lowest point of pillar 4 top surface

      pillar5TopLeft:  [1386, 676],  // pin 1 — leftmost corner of pillar 5 top surface
      pillar5TopRight: [1555, 683],  // pin 3 — rightmost corner of pillar 5 top surface
      pillar5ImageTop: [1438, 366],  // pin 5 — top-center of pillar 5 display area
      pillar5Lowest:   [1443, 686],  // pin 2 — lowest point of pillar 5 top surface

      pillar6TopLeft:  [381, 645],   // pin 2 — leftmost corner of pillar 6 top surface
      pillar6TopRight: [481, 641],   // pin 4 — rightmost corner of pillar 6 top surface
      pillar6ImageTop: [435, 480],   // pin 5 — top-center of pillar 6 display area
      pillar6Lowest:   [444, 647],   // pin 3 — lowest point of pillar 6 top surface

      // Plasma ball — centroid of the INNER arch polygon (the throne/idol silhouette)
      plasmaCenter: [836, 473],
    };

    // ══════════════════════════════════════════════════════════════════════════
    //  Image arrays — one per pillar; loaded once at startup
    // ══════════════════════════════════════════════════════════════════════════
    function loadImgs(prefix, count) {
      const imgs = [];
      for (let i = 1; i <= count; i++) {
        const img = new Image();
        img.src = `${prefix}_${String(i).padStart(2, '0')}.png`;
        imgs.push(img);
      }
      return imgs;
    }

    const SWORD_IMGS_1    = loadImgs('sword_holo',   10);
    const SOLDIER_IMGS_2  = loadImgs('soldier_holo', 10);
    const ANGEL_IMGS_3    = loadImgs('angel_holo',   10);
    const ABSTRACT_IMGS_4 = loadImgs('abstract_holo', 10);
    const PRIEST_IMGS_5   = loadImgs('priest_holo',   10);
    const ALIEN_IMGS_6    = loadImgs('alien_holo',    10);

    // ══════════════════════════════════════════════════════════════════════════
    //  Pillar display factory
    // ══════════════════════════════════════════════════════════════════════════
    function makeSwordRect(ancTLKey, ancTRKey, ancTCKey, ancLowestKey, imgs, offsetPY, scale) {
      if (!imgNaturalW) return null;
      const ancTL = ANCHORS[ancTLKey], ancTR = ANCHORS[ancTRKey], ancTC = ANCHORS[ancTCKey];
      if (!ancTL || !ancTR || !ancTC) return null;
      const sTL = paintToCanvas(ancTL[0], ancTL[1]);
      const sTR = paintToCanvas(ancTR[0], ancTR[1]);
      const sTC = paintToCanvas(ancTC[0], ancTC[1]);
      const { s } = coverScale();
      // bottom anchor: use lowest trapezoid point if provided, else average TL/TR
      const lowestAnc = ancLowestKey ? ANCHORS[ancLowestKey] : null;
      const pillarY = lowestAnc
        ? paintToCanvas(lowestAnc[0], lowestAnc[1]).y
        : (sTL.y + sTR.y) / 2;
      const img0 = imgs[0];
      if (!img0.complete || !img0.naturalWidth) return null;
      const h = (pillarY - sTC.y) * scale;
      const w = h * (img0.naturalWidth / img0.naturalHeight);
      const y = pillarY - h + offsetPY * s;
      return { x: (sTL.x + sTR.x) / 2 - w / 2, y, w, h };
    }

    function makePillarDisplay(imgs, ancTLKey, ancTRKey, ancTCKey, ancLowestKey = null, offsetPY = 0, scale = 1.0, offsetMS = 0) {
      const SWITCH_MS = 12000, FADE_MS = 1000;
      let curIdx = 0, nextIdx = 1;
      let switchAt = -1; // initialized on first draw frame to avoid rAF throttle desync
      let fading = false, fadeStart = 0;
      const MAX_P = 7, parts = [];

      function getRect() { return makeSwordRect(ancTLKey, ancTRKey, ancTCKey, ancLowestKey, imgs, offsetPY, scale); }

      function spawn(r) {
        parts.push({
          x: r.x + rnd(0, r.w), y: r.y + rnd(0, r.h),
          vx: rnd(-0.12, 0.12), vy: rnd(-0.30, -0.06),
          life: 0, maxLife: rnd(900, 1800), r: rnd(0.7, 1.5),
        });
      }

      function drawGlow(ctx, now) {
        const r = getRect(); if (!r) return;
        const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const pulse = 0.5 + 0.5 * Math.sin(now * 0.0013);
        const alpha = 0.13 + pulse * 0.07;
        const halo  = ctx.createRadialGradient(cx, cy, 0, cx, cy, r.w * 0.62);
        halo.addColorStop(0,   `rgba(120,190,255,${alpha})`);
        halo.addColorStop(0.5, `rgba(60,130,255,${alpha * 0.5})`);
        halo.addColorStop(1,   'rgba(0,0,80,0)');
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.ellipse(cx, cy, r.w * 0.62, r.h * 0.52, 0, 0, TAU);
        ctx.fill();
        ctx.restore();
      }

      function drawParticles(ctx, dt) {
        const r = getRect(); if (!r) return;
        if (parts.length < MAX_P && Math.random() < 0.05) spawn(r);
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (let i = parts.length - 1; i >= 0; i--) {
          const p = parts[i];
          p.life += dt; p.x += p.vx; p.y += p.vy;
          if (p.life >= p.maxLife) { parts.splice(i, 1); continue; }
          const alpha = Math.sin((p.life / p.maxLife) * Math.PI) * 0.55;
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.5);
          g.addColorStop(0,   `rgba(200,230,255,${alpha})`);
          g.addColorStop(0.5, `rgba(100,180,255,${alpha * 0.4})`);
          g.addColorStop(1,   'rgba(0,40,180,0)');
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 2.5, 0, TAU); ctx.fill();
        }
        ctx.restore();
      }

      function drawImage(ctx, now) {
        const r = getRect(); if (!r) return;
        const img0 = imgs[curIdx];
        if (!img0.complete || !img0.naturalWidth) return;
        const { x: dx, y: dy, w: dw, h: dh } = r;
        if (switchAt < 0) switchAt = now + offsetMS;
        if (!fading && now >= switchAt) { fading = true; fadeStart = now; }
        if (!fading) {
          ctx.drawImage(img0, dx, dy, dw, dh);
        } else {
          const p = Math.min(1, (now - fadeStart) / FADE_MS);
          ctx.save(); ctx.globalAlpha = 1 - p; ctx.drawImage(img0, dx, dy, dw, dh); ctx.restore();
          const img1 = imgs[nextIdx];
          if (img1.complete && img1.naturalWidth) {
            ctx.save(); ctx.globalAlpha = p; ctx.drawImage(img1, dx, dy, dw, dh); ctx.restore();
          }
          if (p >= 1) {
            curIdx = nextIdx; nextIdx = (nextIdx + 1) % imgs.length;
            fading = false; switchAt = now + SWITCH_MS;
          }
        }
      }

      return { drawGlow, drawImage, drawParticles };
    }

    // ── Pillar instances ────────────────────────────────────────────────────
    const pillar1 = makePillarDisplay(SWORD_IMGS_1,    'pillar1TopLeft', 'pillar1TopRight', 'pillar1ImageTop', 'pillar1Lowest', 0, 1.0,    2000);
    const pillar2 = makePillarDisplay(SOLDIER_IMGS_2,  'pillar2TopLeft', 'pillar2TopRight', 'pillar2ImageTop', 'pillar2Lowest', 0, 1.25,   4000);
    const pillar3 = makePillarDisplay(ANGEL_IMGS_3,    'pillar3TopLeft', 'pillar3TopRight', 'pillar3ImageTop', 'pillar3Lowest', 0, 1.0,    6000);
    const pillar4 = makePillarDisplay(ABSTRACT_IMGS_4, 'pillar4TopLeft', 'pillar4TopRight', 'pillar4ImageTop', 'pillar4Lowest', 0, 1.1,    8000);
    const pillar5 = makePillarDisplay(PRIEST_IMGS_5,   'pillar5TopLeft', 'pillar5TopRight', 'pillar5ImageTop', 'pillar5Lowest', 0, 0.972, 10000);
    const pillar6 = makePillarDisplay(ALIEN_IMGS_6,    'pillar6TopLeft', 'pillar6TopRight', 'pillar6ImageTop', 'pillar6Lowest', 0, 1.1,  12000);

    // ══════════════════════════════════════════════════════════════════════════
    //  Floor energy pulse lines
    // ══════════════════════════════════════════════════════════════════════════
    const floorLines = (() => {
      // Each line definition:
      //   points — [px,py] paint-coord waypoints along the full path (viewer→altar)
      //   segs   — boolean per segment between consecutive points: true=visible, false=behind a pillar
      // Pulses travel at constant speed along the whole path; drawing is skipped
      // during occluded segments so they appear to pass through the pillars.
      // null entries = line not yet measured.
      const DEFS = [
        {
          // Left inner line — passes behind pillars 2 (near), 6 (mid), 1 (far left)
          points: [[7,883],[137,828],[274,784],[389,742],[469,715],[555,687]],
          segs:   [true, false, true, false, true],
          speed: 0.00012, phase: 0.0,
        },
        {
          // Right inner line — passes behind pillars 5 (near), 4 (mid), 3 (far right)
          points: [[1668,885],[1534,829],[1398,783],[1287,744],[1201,716],[1114,683]],
          segs:   [true, false, true, false, true],
          speed: 0.00012, phase: 0.5,
        },
        { points: [[466,892],[723,679]],  segs: [true], speed: 0.00013, phase: 0.15 }, // Left outer A
        { points: [[573,895],[755,678]],  segs: [true], speed: 0.00015, phase: 0.65 }, // Left outer B
        { points: [[1102,897],[920,681]], segs: [true], speed: 0.00014, phase: 0.38 }, // Right outer A
        { points: [[1203,892],[950,679]], segs: [true], speed: 0.00012, phase: 0.88 }, // Right outer B
      ];

      const R = 190, G = 100, B = 255; // electric purple

      function draw(ctx, t) {
        for (const def of DEFS) {
          if (!def) continue;
          _drawLine(ctx, def, t);
        }
      }

      function _drawLine(ctx, def, t) {
        const { points, segs, speed, phase } = def;
        const pts = points.map(([px, py]) => paintToCanvas(px, py));

        // Cumulative screen-space distances along full path
        const dists = [0];
        for (let i = 0; i < pts.length - 1; i++) {
          const dx = pts[i+1].x - pts[i].x, dy = pts[i+1].y - pts[i].y;
          dists.push(dists[i] + Math.sqrt(dx*dx + dy*dy));
        }
        const total = dists[dists.length - 1];
        if (total < 1) return;

        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        // ── Ambient base glow on visible segments only ──────────────────────
        const breathe = 0.5 + 0.5 * Math.sin(t * 0.00083);
        const baseA   = 0.05 + breathe * 0.025;
        for (let i = 0; i < segs.length; i++) {
          if (!segs[i]) continue;
          const p0 = pts[i], p1 = pts[i+1];
          const gw = [12, 5, 2], ga = [baseA * 0.22, baseA * 0.50, baseA];
          for (let p = 0; p < 3; p++) {
            ctx.strokeStyle = `rgba(${R},${G},${B},${ga[p]})`;
            ctx.lineWidth = gw[p]; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
          }
        }

        // ── Two staggered traveling pulses (capsule shape) ──────────────────
        const PR     = Math.max(3, Math.min(6, total * 0.022));
        const CAP_HL = PR * 1.2; // half-length of the capsule body
        for (let k = 0; k < 2; k++) {
          const frac = (t * speed + phase + k * 0.5) % 1.0;
          const dist = frac * total;

          // Find which segment the pulse currently occupies
          let seg = segs.length - 1;
          for (let i = 0; i < segs.length; i++) {
            if (dist < dists[i + 1]) { seg = i; break; }
          }
          if (!segs[seg]) continue; // behind a pillar — skip drawing

          // Interpolate position within the segment
          const segLen = dists[seg+1] - dists[seg];
          const sf     = segLen > 0 ? (dist - dists[seg]) / segLen : 0;
          const p0 = pts[seg], p1 = pts[seg+1];
          const px = p0.x + (p1.x - p0.x) * sf;
          const py = p0.y + (p1.y - p0.y) * sf;

          // Unit direction vector for capsule orientation
          const sdx = p1.x - p0.x, sdy = p1.y - p0.y;
          const sl  = Math.sqrt(sdx*sdx + sdy*sdy) || 1;
          const nx  = sdx / sl, ny = sdy / sl;

          // Flat-top brightness envelope
          const env = clamp(frac * 8, 0, 1) * clamp((1 - frac) * 8, 0, 1);
          const pA  = env * 0.55;
          if (pA < 0.01) continue;

          // Clamp each arm against segment boundaries so the capsule shrinks
          // into pillars and grows back out rather than popping on/off.
          const frontArm = Math.min(CAP_HL, dists[seg+1] - dist);
          const backArm  = Math.min(CAP_HL, dist - dists[seg]);
          const cx0 = px - nx * backArm,  cy0 = py - ny * backArm;
          const cx1 = px + nx * frontArm, cy1 = py + ny * frontArm;

          ctx.lineCap = 'round';
          // Outer glow — wide, soft
          ctx.strokeStyle = `rgba(${R},${G},${B},${pA * 0.22})`;
          ctx.lineWidth   = PR * 4.5;
          ctx.beginPath(); ctx.moveTo(cx0, cy0); ctx.lineTo(cx1, cy1); ctx.stroke();
          // Mid body
          ctx.strokeStyle = `rgba(${R},${G},${B},${pA * 0.60})`;
          ctx.lineWidth   = PR * 1.8;
          ctx.beginPath(); ctx.moveTo(cx0, cy0); ctx.lineTo(cx1, cy1); ctx.stroke();
          // Bright white core
          ctx.strokeStyle = `rgba(255,230,255,${pA})`;
          ctx.lineWidth   = PR * 0.45;
          ctx.beginPath(); ctx.moveTo(cx0, cy0); ctx.lineTo(cx1, cy1); ctx.stroke();
        }

        ctx.restore();
      }

      return { draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Plasma ball — central throne/idol
    // ══════════════════════════════════════════════════════════════════════════
    const plasmaBall = (() => {
      const RADIUS_PX     = 160;  // ball radius in paint-pixels
      const TENDRIL_N     = 4;    // main plasma arms
      const BRANCH_CHANCE = 0.42; // probability of secondary branch per arm
      const REGEN_MS      = 2000; // how often a new target shape is picked (= TRANS_MS = continuous flow)
      const TRANS_MS      = 2000; // how long the morph from old→new takes

      let _arms    = [];   // {fromPts, toPts, fromBpts, toBpts, phase}
      let _regenAt = -9999;

      function _zigzag(x0, y0, x1, y1, depth, spread, pts) {
        if (depth === 0) {
          if (pts.length === 0) pts.push(x0, y0);
          pts.push(x1, y1);
          return;
        }
        const mx = (x0 + x1) / 2 + (Math.random() - 0.5) * spread;
        const my = (y0 + y1) / 2 + (Math.random() - 0.5) * spread;
        _zigzag(x0, y0, mx, my, depth - 1, spread * 0.58, pts);
        _zigzag(mx, my, x1, y1, depth - 1, spread * 0.58, pts);
      }

      function _stroke(ctx, pts, lw, alpha, rgb) {
        if (pts.length < 4) return;
        ctx.strokeStyle = `rgba(${rgb},${alpha})`;
        ctx.lineWidth   = lw;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.beginPath();
        ctx.moveTo(pts[0], pts[1]);
        for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i + 1]);
        ctx.stroke();
      }

      // Lerp two flat [x,y,x,y,...] arrays element-wise
      function _lerpPts(a, b, p) {
        const out = new Array(a.length);
        for (let i = 0; i < a.length; i++) out[i] = a[i] + (b[i] - a[i]) * p;
        return out;
      }

      function _ease(p) { return p * p * (3 - 2 * p); } // smoothstep

      function _makePath(c, R, drift, k) {
        const ang = (k / TENDRIL_N) * TAU + drift + (Math.random() - 0.5) * 0.25;
        const ex  = c.x + Math.cos(ang) * R;
        const ey  = c.y + Math.sin(ang) * R;
        const pts = [];
        _zigzag(c.x, c.y, ex, ey, 4, R * 0.30, pts);
        let bpts = null;
        if (Math.random() < BRANCH_CHANCE) {
          const bi  = Math.floor(2 + Math.random() * (pts.length / 2 - 3)) * 2;
          const bx0 = pts[bi], by0 = pts[bi + 1];
          const bang = ang + (Math.random() - 0.5) * 1.7;
          const bR   = R * (0.28 + Math.random() * 0.38);
          bpts = [];
          _zigzag(bx0, by0, bx0 + Math.cos(bang) * bR, by0 + Math.sin(bang) * bR, 3, bR * 0.36, bpts);
        }
        return { pts, bpts };
      }

      function _regen(c, R, drift) {
        if (_arms.length === 0) {
          // First build — fromPts = toPts so no initial morph
          for (let k = 0; k < TENDRIL_N; k++) {
            const { pts, bpts } = _makePath(c, R, drift, k);
            _arms.push({ fromPts: pts, toPts: pts, fromBpts: bpts, toBpts: bpts, phase: Math.random() * TAU });
          }
        } else {
          // Advance: current target becomes new source, generate a fresh target
          for (let k = 0; k < _arms.length; k++) {
            const arm = _arms[k];
            arm.fromPts  = arm.toPts;
            arm.fromBpts = arm.toBpts;
            const { pts, bpts } = _makePath(c, R, drift, k);
            arm.toPts  = pts;
            arm.toBpts = bpts;
          }
        }
      }

      function draw(ctx, t) {
        if (!ANCHORS.plasmaCenter || !imgNaturalW) return;
        const { s } = coverScale();
        const c = paintToCanvas(ANCHORS.plasmaCenter[0], ANCHORS.plasmaCenter[1]);
        const R = RADIUS_PX * s;
        const drift = t * 0.000048;

        if (t - _regenAt > REGEN_MS) { _regen(c, R, drift); _regenAt = t; }
        if (_arms.length === 0) return;

        // Smoothstep transition progress within current cycle
        const transP = _ease(Math.min(1, (t - _regenAt) / TRANS_MS));

        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        // Ambient sphere glow
        const pulse = 0.5 + 0.5 * Math.sin(t * 0.00097);
        const sph = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, R * 1.15);
        sph.addColorStop(0,    `rgba(230,180,255,${0.32 + pulse * 0.18})`);
        sph.addColorStop(0.25, `rgba(160, 80,255,${0.22 + pulse * 0.10})`);
        sph.addColorStop(0.65, `rgba( 80, 20,200,${0.10})`);
        sph.addColorStop(1,    'rgba(30,0,100,0)');
        ctx.fillStyle = sph;
        ctx.beginPath(); ctx.arc(c.x, c.y, R * 1.15, 0, TAU); ctx.fill();

        // Glass sphere ring
        ctx.strokeStyle = `rgba(190,130,255,${0.20 + pulse * 0.09})`;
        ctx.lineWidth   = s * 1.5;
        ctx.beginPath(); ctx.arc(c.x, c.y, R, 0, TAU); ctx.stroke();
        // Specular highlight arc (upper-left quadrant)
        ctx.strokeStyle = `rgba(240,210,255,${0.28 + pulse * 0.10})`;
        ctx.lineWidth   = s * 0.7;
        ctx.beginPath(); ctx.arc(c.x, c.y, R, Math.PI * 1.15, Math.PI * 1.72); ctx.stroke();

        // Draw tendrils — each point lerped between fromPts and toPts each frame
        for (const { fromPts, toPts, fromBpts, toBpts, phase } of _arms) {
          const fl  = 0.65 + 0.35 * Math.sin(t * 0.0018 + phase);
          const pts = _lerpPts(fromPts, toPts, transP);
          _stroke(ctx, pts, s * 3.8, fl * 0.20, '140,60,255');
          _stroke(ctx, pts, s * 1.5, fl * 0.58, '185,105,255');
          _stroke(ctx, pts, s * 0.5, fl * 0.92, '235,210,255');

          // Branch: lerp if both frames have one, else fade in/out
          if (fromBpts && toBpts) {
            const bpts = _lerpPts(fromBpts, toBpts, transP);
            _stroke(ctx, bpts, s * 2.4, fl * 0.17, '155,80,255');
            _stroke(ctx, bpts, s * 0.9, fl * 0.50, '205,155,255');
            _stroke(ctx, bpts, s * 0.3, fl * 0.85, '245,225,255');
          } else if (toBpts) {
            ctx.save(); ctx.globalAlpha = transP;
            _stroke(ctx, toBpts, s * 2.4, fl * 0.17, '155,80,255');
            _stroke(ctx, toBpts, s * 0.9, fl * 0.50, '205,155,255');
            _stroke(ctx, toBpts, s * 0.3, fl * 0.85, '245,225,255');
            ctx.restore();
          } else if (fromBpts) {
            ctx.save(); ctx.globalAlpha = 1 - transP;
            _stroke(ctx, fromBpts, s * 2.4, fl * 0.17, '155,80,255');
            _stroke(ctx, fromBpts, s * 0.9, fl * 0.50, '205,155,255');
            _stroke(ctx, fromBpts, s * 0.3, fl * 0.85, '245,225,255');
            ctx.restore();
          }
        }

        // Inner core
        const corA = 0.62 + pulse * 0.38;
        const core = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, R * 0.20);
        core.addColorStop(0,    `rgba(255,248,255,${corA})`);
        core.addColorStop(0.45, `rgba(215,175,255,${corA * 0.55})`);
        core.addColorStop(1,    'rgba(140,70,255,0)');
        ctx.fillStyle = core;
        ctx.beginPath(); ctx.arc(c.x, c.y, R * 0.20, 0, TAU); ctx.fill();

        ctx.restore();
      }

      return { draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Canvas setup
    // ══════════════════════════════════════════════════════════════════════════
    const fxCanvas  = document.getElementById('effects');
    const dbgCanvas = document.getElementById('dbg-canvas');
    const fxCtx     = fxCanvas.getContext('2d');
    const dbgCtx    = dbgCanvas.getContext('2d');

    function resize() {
      const W = window.innerWidth, H = window.innerHeight;
      fxCanvas.width  = dbgCanvas.width  = W;
      fxCanvas.height = dbgCanvas.height = H;
    }
    resize();
    window.addEventListener('resize', () => {
      resize();
      redrawDebugPins();
    });

    function rnd(a, b)        { return a + Math.random() * (b - a); }
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
    const TAU = Math.PI * 2;

    // ══════════════════════════════════════════════════════════════════════════
    //  Back window stars
    // ══════════════════════════════════════════════════════════════════════════
    const backWindowStars = (() => {
      const OUTER = [[713,537],[712,364],[750,319],[839,178],[921,317],[954,364],[957,553]];
      const INNER = [[728,545],[736,462],[836,318],[922,448],[949,516],[942,552]];

      function pip(px, py, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
          const xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
          if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi))
            inside = !inside;
        }
        return inside;
      }

      const minX = Math.min(...OUTER.map(p => p[0]));
      const maxX = Math.max(...OUTER.map(p => p[0]));
      const minY = Math.min(...OUTER.map(p => p[1]));
      const maxY = Math.max(...OUTER.map(p => p[1]));

      // Cosmic color palettes: [core, mid, glow]
      const PALS = [
        ['255,255,255', '200,215,255', '90,110,255'],   // blue-white
        ['255,255,255', '190,255,245', '40,200,180'],   // cyan-teal
        ['255,230,255', '225,160,255', '160,80,255'],   // violet
        ['255,255,210', '255,225,140', '210,155,50'],   // gold-amber
        ['255,240,255', '255,165,220', '210,75,160'],   // pink-rose
        ['210,245,255', '130,205,255', '50,140,245'],   // ice-blue
        ['255,255,255', '200,255,210', '60,200,120'],   // mint-green
      ];

      const COUNT = 80;
      const stars = [];
      let tries = 0;
      while (stars.length < COUNT && tries < 20000) {
        tries++;
        const px = minX + Math.random() * (maxX - minX);
        const py = minY + Math.random() * (maxY - minY);
        if (!pip(px, py, OUTER) || pip(px, py, INNER)) continue;
        const roll = Math.random();
        stars.push({
          px, py,
          phase: Math.random() * TAU,
          freq:  0.0005 + Math.random() * 0.0015,
          r:     roll < 0.07 ? rnd(2.5, 4.5) : roll < 0.25 ? rnd(1.2, 2.5) : rnd(0.4, 1.2),
          tier:  roll < 0.07 ? 2 : roll < 0.25 ? 1 : 0,
          pal:   Math.floor(Math.random() * PALS.length),
        });
      }

      function draw(ctx, t) {
        if (!imgNaturalW) return;
        ctx.save();

        // Clip to outer arch minus inner obstruction (even-odd)
        ctx.beginPath();
        const os = OUTER.map(([px, py]) => paintToCanvas(px, py));
        ctx.moveTo(os[0].x, os[0].y);
        for (let i = 1; i < os.length; i++) ctx.lineTo(os[i].x, os[i].y);
        ctx.closePath();
        const is = INNER.map(([px, py]) => paintToCanvas(px, py));
        ctx.moveTo(is[0].x, is[0].y);
        for (let i = 1; i < is.length; i++) ctx.lineTo(is[i].x, is[i].y);
        ctx.closePath();
        ctx.clip('evenodd');

        ctx.globalCompositeOperation = 'screen';
        const { s } = coverScale();

        for (const star of stars) {
          const sc = paintToCanvas(star.px, star.py);
          const pulse = 0.5 + 0.5 * Math.sin(t * star.freq + star.phase);
          const r = star.r * s;
          const [core, mid, glow] = PALS[star.pal];

          if (star.tier === 2) {
            // Bright star: glow + small cross sparkle
            const alpha = 0.5 + pulse * 0.5;
            const gr = ctx.createRadialGradient(sc.x, sc.y, 0, sc.x, sc.y, r * 5);
            gr.addColorStop(0,   `rgba(255,255,255,${alpha})`);
            gr.addColorStop(0.2, `rgba(${mid},${alpha * 0.7})`);
            gr.addColorStop(0.6, `rgba(${glow},${alpha * 0.25})`);
            gr.addColorStop(1,   `rgba(${glow},0)`);
            ctx.fillStyle = gr;
            ctx.beginPath(); ctx.arc(sc.x, sc.y, r * 5, 0, TAU); ctx.fill();
            // Small cross spikes — length r*2.5, thin
            ctx.strokeStyle = `rgba(${core},${alpha * 0.55})`;
            ctx.lineWidth = r * 0.2; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(sc.x - r * 2.5, sc.y); ctx.lineTo(sc.x + r * 2.5, sc.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(sc.x, sc.y - r * 2.5); ctx.lineTo(sc.x, sc.y + r * 2.5); ctx.stroke();
          } else if (star.tier === 1) {
            // Medium star
            const alpha = 0.3 + pulse * 0.55;
            const gr = ctx.createRadialGradient(sc.x, sc.y, 0, sc.x, sc.y, r * 4);
            gr.addColorStop(0,   `rgba(255,255,255,${alpha})`);
            gr.addColorStop(0.3, `rgba(${mid},${alpha * 0.5})`);
            gr.addColorStop(1,   `rgba(${glow},0)`);
            ctx.fillStyle = gr;
            ctx.beginPath(); ctx.arc(sc.x, sc.y, r * 4, 0, TAU); ctx.fill();
          } else {
            // Small star
            const alpha = 0.15 + pulse * 0.65;
            const gr = ctx.createRadialGradient(sc.x, sc.y, 0, sc.x, sc.y, r * 3);
            gr.addColorStop(0,   `rgba(255,255,255,${alpha})`);
            gr.addColorStop(0.4, `rgba(${mid},${alpha * 0.35})`);
            gr.addColorStop(1,   `rgba(${glow},0)`);
            ctx.fillStyle = gr;
            ctx.beginPath(); ctx.arc(sc.x, sc.y, r * 3, 0, TAU); ctx.fill();
          }
        }

        ctx.restore();
      }

      return { draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Ground fog — dense billowing mist pooling on the cathedral floor
    // ══════════════════════════════════════════════════════════════════════════
    const groundFog = (() => {
      // [px, py, rx, ry, phase, baseAlpha]
      // Floor outer boundary (from ?debug): left edge [7,751]→[512,652], right edge [1669,750]→[1181,657].
      // Floor is nearly full-width at y≈751; outer blobs cover from x≈0 to x≈1672 at each depth row.
      const BLOBS = [
        // Near row (y ≈ 885) — full width, densest
        [150,  888, 260, 110, 0.00, 1.0],
        [540,  885, 230, 105, 1.20, 0.95],
        [836,  886, 215, 100, 2.50, 0.95],
        [1120, 885, 232, 105, 0.70, 0.97],
        [1510, 888, 255, 110, 1.90, 1.0],
        // Mid row (y ≈ 800) — outer blobs extend to floor side edges
        [60,   800, 145,  75, 4.20, 0.88],
        [340,  800, 162,  78, 3.10, 0.85],
        [625,  798, 155,  74, 0.45, 0.82],
        [836,  800, 150,  72, 2.10, 0.82],
        [1020, 798, 155,  74, 1.65, 0.82],
        [1320, 800, 162,  78, 0.90, 0.85],
        [1605, 800, 145,  75, 2.80, 0.88],
        // Outer-edge row (y ≈ 752) — at the measured left [7,751] / right [1669,750] floor boundary
        [50,   752, 125,  58, 1.70, 0.80],
        [1640, 752, 125,  58, 0.50, 0.80],
        // Far-mid row (y ≈ 730) — outer blobs reach x≈113 left / x≈1562 right boundary
        [200,  732, 112,  48, 0.55, 0.68],
        [615,  732,  98,  50, 2.80, 0.70],
        [836,  730,  94,  48, 0.30, 0.68],
        [1055, 732,  98,  50, 1.50, 0.70],
        [1450, 732, 112,  48, 3.20, 0.68],
        // Far row (y ≈ 690) — altar end; boundary x≈320 left / x≈1352 right
        [400,  690,  75,  34, 1.10, 0.55],
        [715,  690,  62,  32, 2.20, 0.52],
        [836,  690,  64,  32, 3.50, 0.52],
        [958,  690,  62,  32, 0.80, 0.52],
        [1265, 690,  75,  34, 1.90, 0.55],
      ];

      function draw(ctx, t) {
        if (!imgNaturalW) return;
        const { s } = coverScale();
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (const [px, py, rx, ry, phase, baseAlpha] of BLOBS) {
          const driftX = 4.5 * Math.sin(t * 0.00031 + phase);
          const driftY = 2.0 * Math.cos(t * 0.00047 + phase * 1.3);
          const c   = paintToCanvas(px + driftX, py + driftY);
          const crx = rx * s, cry = ry * s;
          const breathe = 0.72 + 0.28 * Math.sin(t * 0.00062 + phase * 0.8);
          const a = baseAlpha * breathe;
          ctx.save();
          ctx.translate(c.x, c.y);
          ctx.scale(crx, cry); // unit circle → ellipse of crx × cry px
          const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
          g.addColorStop(0,    `rgba(218, 208, 255, ${a})`);
          g.addColorStop(0.45, `rgba(208, 198, 255, ${a * 0.55})`);
          g.addColorStop(1,    'rgba(195, 185, 255, 0)');
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(0, 0, 1, 0, TAU); ctx.fill();
          ctx.restore();
        }
        ctx.restore();
      }

      return { draw };
    })();

    // ══════════════════════════════════════════════════════════════════════════
    //  Event dispatch
    // ══════════════════════════════════════════════════════════════════════════
    function handleSceneEvent(name) {
      switch (name) {
        // events added here as they are built
      }
    }

    window.chrome?.webview?.addEventListener('message', e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'event') handleSceneEvent(msg.name, msg.data);
      } catch {}
    });

    // ══════════════════════════════════════════════════════════════════════════
    //  Draw order
    // ══════════════════════════════════════════════════════════════════════════
    function drawEffects(dt, t, now) {
      fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
      // back window stars — drawn first, appear inside the cosmic arch behind the structure
      backWindowStars.draw(fxCtx, t);
      // plasma ball — around the central throne, in front of the window
      plasmaBall.draw(fxCtx, t);
      // pillar glow passes (behind images)
      pillar1.drawGlow(fxCtx, now);
      pillar2.drawGlow(fxCtx, now);
      pillar3.drawGlow(fxCtx, now);
      pillar4.drawGlow(fxCtx, now);
      pillar5.drawGlow(fxCtx, now);
      pillar6.drawGlow(fxCtx, now);
      // pillar image passes
      pillar1.drawImage(fxCtx, now);
      pillar2.drawImage(fxCtx, now);
      pillar3.drawImage(fxCtx, now);
      pillar4.drawImage(fxCtx, now);
      pillar5.drawImage(fxCtx, now);
      pillar6.drawImage(fxCtx, now);
      // floor energy lines — occlusion handled per-segment inside the IIFE
      floorLines.draw(fxCtx, t);
      // ground fog — mist pooling on the floor; drawn after lines so energy channels glow through it
      groundFog.draw(fxCtx, t);
      // particle passes (in front)
      pillar1.drawParticles(fxCtx, dt);
      pillar2.drawParticles(fxCtx, dt);
      pillar3.drawParticles(fxCtx, dt);
      pillar4.drawParticles(fxCtx, dt);
      pillar5.drawParticles(fxCtx, dt);
      pillar6.drawParticles(fxCtx, dt);
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  Main loop
    // ══════════════════════════════════════════════════════════════════════════
    let t    = 0;
    let last = performance.now();

    function frame(now) {
      const dt = Math.min(now - last, 50);
      last = now;
      t   += dt;
      drawEffects(dt, t, now);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ══════════════════════════════════════════════════════════════════════════
    //  Debug system — append ?debug to URL to enable
    // ══════════════════════════════════════════════════════════════════════════
    const debugMode  = location.search.includes('debug');
    const dbgPanel   = document.getElementById('dbg-panel');
    const dbgOverlay = document.getElementById('dbg-overlay');
    let debugPins    = [];

    function updateDebugPanel(text) {
      dbgPanel.textContent = text;
    }

    function redrawDebugPins() {
      dbgCtx.clearRect(0, 0, dbgCanvas.width, dbgCanvas.height);
      for (let i = 0; i < debugPins.length; i++) {
        const { px, py } = debugPins[i];
        const { x, y }   = paintToCanvas(px, py);
        dbgCtx.save();
        dbgCtx.strokeStyle = '#0ff';
        dbgCtx.lineWidth   = 1.5;
        dbgCtx.beginPath(); dbgCtx.moveTo(x - 10, y); dbgCtx.lineTo(x + 10, y); dbgCtx.stroke();
        dbgCtx.beginPath(); dbgCtx.moveTo(x, y - 10); dbgCtx.lineTo(x, y + 10); dbgCtx.stroke();
        dbgCtx.fillStyle   = '#0ff';
        dbgCtx.font        = '11px monospace';
        dbgCtx.fillText(`${i+1}: [${px},${py}]`, x + 7, y - 4);
        dbgCtx.restore();
      }
    }

    if (debugMode) {
      dbgPanel.style.display   = 'block';
      dbgOverlay.style.display = 'block';
      updateDebugPanel('Click to pin coordinates. Right-click to clear.');

      dbgOverlay.addEventListener('click', e => {
        const { px, py } = canvasToPaint(e.clientX, e.clientY);
        debugPins.push({ px, py });
        const list = debugPins.map((p, i) => `${i+1}: [${p.px},${p.py}]`).join('\n');
        updateDebugPanel(`Image: ${imgNaturalW}×${imgNaturalH}\n${list}`);
        redrawDebugPins();
        console.log(`Pin ${debugPins.length}: [${px},${py}]`);
      });

      dbgOverlay.addEventListener('contextmenu', e => {
        e.preventDefault();
        debugPins = [];
        dbgCtx.clearRect(0, 0, dbgCanvas.width, dbgCanvas.height);
        updateDebugPanel(`Image: ${imgNaturalW}×${imgNaturalH}\nClick to capture paint coords.`);
      });
    }
  </script>
</body>
